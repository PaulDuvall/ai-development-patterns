minimum_pre_commit_version: "4.6.0"
default_install_hook_types: [pre-commit, commit-msg]
default_stages: [pre-commit]
fail_fast: false

repos:
  - repo: local
    hooks:
      - id: spec-coverage
        name: Validate collected requirement-to-test links
        entry: >-
          python examples/spec-driven-development/spec_validator.py
          --check-coverage
          --spec-file examples/spec-driven-development/iam_policy_spec.md
          --test-dir examples/spec-driven-development/tests
        language: python
        additional_dependencies: ["pytest==9.1.1"]
        pass_filenames: false
        always_run: true

      - id: spec-conflicts
        name: Check specification authority conflicts
        entry: >-
          python examples/spec-driven-development/spec_validator.py
          --authority-conflicts
          --spec-file examples/spec-driven-development/iam_policy_spec.md
          --test-dir examples/spec-driven-development/tests
        language: python
        additional_dependencies: ["pytest==9.1.1"]
        pass_filenames: false
        always_run: true

      - id: spec-syntax
        name: Validate specification syntax
        entry: >-
          python examples/spec-driven-development/spec_validator.py
          --validate-syntax examples/spec-driven-development/iam_policy_spec.md
        language: python
        additional_dependencies: ["pytest==9.1.1"]
        pass_filenames: false
        always_run: true

      - id: embedded-quality-gate
        name: Run the embedded behavior, traceability, and coverage gates
        entry: >-
          bash -c 'cd examples/spec-driven-development && python -m pytest'
        language: python
        additional_dependencies:
          - "pytest==9.1.1"
          - "pytest-cov==7.1.0"
          - "PyYAML==6.0.3"
        pass_filenames: false
        always_run: true

      - id: commit-msg-spec
        name: Require specification anchors on feature commits
        entry: >-
          python examples/spec-driven-development/validate_commit_message.py
        language: python
        stages: [commit-msg]
        always_run: true
