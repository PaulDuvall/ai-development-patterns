[pytest]
minversion = 9.1
testpaths =
    tests
    test_requirement_coverage.py
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-config
    --strict-markers
    --cov=iam_policy_generator
    --cov=spec_validator
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=85
    --tb=short
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
