# Basic AI isolation container

services:
  ai-development:
    build:
      context: .
      dockerfile: Dockerfile.ai-sandbox
    image: ai-development-patterns/security-sandbox:local
    network_mode: none                    # Complete network isolation
    init: true                            # Forward signals and reap child processes
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]                       # Drop all capabilities
    volumes:
      - ./src:/workspace/src:ro           # Read-only source code
      - sandbox-tests:/workspace/tests    # Portable read/write tests only
      # DO NOT mount ~/.aws, .env, secrets/, etc.
    environment:
      - NODE_ENV=development
      - AI_SANDBOX=true
    # The image's interactive-shell default exits immediately when detached.
    command: ["/bin/bash", "-c", "/workspace/init-workspace.sh && exec tail -f /dev/null"]
    restart: no

volumes:
  sandbox-tests:
