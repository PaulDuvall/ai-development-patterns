# Multi-agent parallel sandbox configuration

services:
  ai-agent-backend:
    build:
      context: .
      dockerfile: Dockerfile.ai-sandbox
    image: ai-development-patterns/security-sandbox:local
    network_mode: none
    init: true
    volumes:
      - backend-output:/output            # Isolated, non-root writable output
    ulimits:
      nproc: 256
      nofile: 1024                        # Resource constraints
    environment:
      - AGENT_ID=backend-specialist
      - MAX_EXECUTION_TIME=7200           # 2-hour timeout
    command: ["/bin/bash", "-c", "/workspace/init-workspace.sh && exec tail -f /dev/null"]
    restart: no

  ai-agent-frontend:
    build:
      context: .
      dockerfile: Dockerfile.ai-sandbox
    image: ai-development-patterns/security-sandbox:local
    network_mode: none
    init: true
    volumes:
      - frontend-output:/output           # Isolated, non-root writable output
    ulimits:
      nproc: 256
      nofile: 1024
    environment:
      - AGENT_ID=frontend-specialist
      - MAX_EXECUTION_TIME=7200
    command: ["/bin/bash", "-c", "/workspace/init-workspace.sh && exec tail -f /dev/null"]
    restart: no

  ai-agent-testing:
    build:
      context: .
      dockerfile: Dockerfile.ai-sandbox
    image: ai-development-patterns/security-sandbox:local
    network_mode: none
    init: true
    volumes:
      - testing-output:/output            # Isolated, non-root writable output
    ulimits:
      nproc: 256
      nofile: 1024
    environment:
      - AGENT_ID=testing-specialist
      - MAX_EXECUTION_TIME=7200
    command: ["/bin/bash", "-c", "/workspace/init-workspace.sh && exec tail -f /dev/null"]
    restart: no

volumes:
  backend-output:
  frontend-output:
  testing-output:
