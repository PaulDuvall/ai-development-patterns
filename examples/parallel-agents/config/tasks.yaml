# Machine-checkable contracts for the deterministic local simulator.
# The runner validates every task, dependency, artifact path, and SHA-256
# before writing a fixture. No task invokes a model or provider API.
contract_version: 1
mode: deterministic-local-simulator
execution: simulated
model_calls: 0
provider_api_calls: 0

project:
  name: TaskFlow fixture set
  description: Minimal static artifacts for demonstrating parallel orchestration

tasks:
  - id: frontend-components
    dependencies: []
    fixture_contract:
      status: fixture_generated
      execution: simulated
      artifacts:
        - path: components/TaskList.tsx
          media_type: text/typescript-jsx
          sha256: 131fc1746899df63af0bba1d18d7119e4f676143ebb95a1400d3845f1e758ddf

  - id: database-schema
    dependencies: []
    fixture_contract:
      status: fixture_generated
      execution: simulated
      artifacts:
        - path: schema.prisma
          media_type: text/prisma-schema
          sha256: 7a8c12e8206bbd4f7b895fcdc94c380083765598174c9164329c4289c374538a

  - id: backend-api
    dependencies:
      - database-schema
    fixture_contract:
      status: fixture_generated
      execution: simulated
      artifacts:
        - path: server.js
          media_type: text/javascript
          sha256: a27dcaa55a7fd8bac2880d768e2a5d1237bf7019dcdb693bdd2711cc2576f1b1

  - id: test-suite
    dependencies:
      - frontend-components
      - backend-api
    fixture_contract:
      status: fixture_generated
      execution: simulated
      artifacts:
        - path: test-plan.md
          media_type: text/markdown
          sha256: d0e1313b692d1c6da77732480f6a2477f707d180dfc551308d305581dcc87680
