name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - README.md
      - index.html
      - "*.md"
      - LICENSE
      - patterns.yaml
      - assets/**
      - docs/**
      - examples/**
      - experiments/**
      - verification/**
      - scripts/build.sh
      - scripts/generate-patterns-data.py
      - scripts/update-pattern-count.py
      - .github/workflows/deploy-pages.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: Install build dependencies
        run: python3 -m pip install pyyaml==6.0.3

      - name: Rebuild site from README.md (source of record)
        # README.md is the single source of record. scripts/build.sh refreshes
        # badges + regenerates the dataset and dependency diagram so the deployed
        # site is always in sync, even if a committed artifact was not refreshed.
        run: bash scripts/build.sh

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
