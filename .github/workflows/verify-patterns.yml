name: Pattern Verification & Discovery

on:
  workflow_dispatch:
    inputs:
      provider:
        description: Evidence research provider
        type: choice
        options:
          - openai
          - anthropic
        default: openai
      mode:
        description: Run mode
        type: choice
        options:
          - stale-default
          - full
          - discover-only
          - single-pattern
        default: stale-default
      pattern:
        description: Exact pattern name (required for single-pattern mode)
        type: string
        required: false
      stale_days:
        description: Staleness threshold, 1-3650 days
        type: string
        default: "90"
      since_days:
        description: Discovery lookback, 1-365 days
        type: string
        default: "30"
      max_turns:
        description: Anthropic per-unit turn ceiling, 1-500 (blank uses the mode default)
        type: string
        required: false
      allow_open_verification_pr:
        description: Allow a manual run beside an older open verification PR (conflicts may need rebase)
        type: boolean
        default: false
      confirm_full_catalog:
        description: Acknowledge that full mode may launch one paid worker for every available pattern plus discovery
        type: boolean
        default: false
      allow_high_cost_model:
        description: Allow a manual run to use an OpenAI model outside the reviewed cost-sensitive allowlist
        type: boolean
        default: false
  schedule:
    # Weekly evidence refresh; monthly cron switches to discovery-only mode.
    - cron: "0 5 * * 1"
    - cron: "0 6 1 * *"

permissions: {}

concurrency:
  group: verify-patterns
  cancel-in-progress: false

jobs:
  prepare:
    name: Validate run inputs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read # Lists open verification PRs for conflict/in-flight guards.
    outputs:
      base_sha: ${{ steps.inputs.outputs.base_sha }}
      provider: ${{ steps.inputs.outputs.provider }}
      model: ${{ steps.inputs.outputs.model }}
      prompt_version: ${{ steps.inputs.outputs.prompt_version }}
      contract_sha256: ${{ steps.contract.outputs.sha256 }}
      mode: ${{ steps.inputs.outputs.mode }}
      pattern: ${{ steps.inputs.outputs.pattern }}
      stale_days: ${{ steps.inputs.outputs.stale_days }}
      since_days: ${{ steps.inputs.outputs.since_days }}
      checked_date: ${{ steps.inputs.outputs.checked_date }}
      max_turns: ${{ steps.inputs.outputs.max_turns }}
      allow_open_verification_pr: ${{ steps.inputs.outputs.allow_open_verification_pr }}
      selected_slugs: ${{ steps.inventory.outputs.selected_slugs }}
      execution_matrix: ${{ steps.inventory.outputs.execution_matrix }}
      plan_id: ${{ steps.inventory.outputs.plan_id }}
      has_units: ${{ steps.inventory.outputs.has_units }}
      unit_count: ${{ steps.inventory.outputs.unit_count }}
      scanner_sha256: ${{ steps.scanner.outputs.sha256 }}
    steps:
      - name: Checkout trusted base revision
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install input-validation dependency
        run: python3 -m pip install pyyaml==6.0.2

      - name: Fingerprint trusted candidate scanner
        id: scanner
        run: echo "sha256=$(sha256sum scripts/scan-candidate-secrets.py | cut -d ' ' -f 1)" >> "$GITHUB_OUTPUT"

      - name: Fingerprint reviewed research contract
        id: contract
        run: |
          sha256=$(
            sha256sum \
              .github/workflows/verify-patterns.yml \
              .github/codex/evidence-research.toml \
              .claude/commands/verify-patterns.md \
              pattern-spec.md \
              verification/README.md \
              scripts/activate-verification-unit.py \
              scripts/build-verification-inventory.py \
              scripts/check-claude-execution.py \
              scripts/check-provider-preflight.py \
              scripts/check-research-workspace.py \
              scripts/evidence_content.py \
              scripts/export-verification-unit.py \
              scripts/hydrate-evidence-content.py \
              scripts/scan-candidate-secrets.py \
              scripts/validate-evidence.py \
              scripts/validate-research-scope.py \
              tests/requirements.txt \
              | sha256sum | cut -d ' ' -f 1
          )
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"

      - name: Validate and normalize inputs
        id: inputs
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_REF: ${{ github.ref }}
          REQUESTED_PROVIDER: ${{ inputs.provider || 'openai' }}
          OPENAI_MODEL: ${{ vars.OPENAI_EVIDENCE_MODEL || 'gpt-5.6-luna' }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_EVIDENCE_MODEL || 'claude-sonnet-5' }}
          RESEARCH_CONTRACT_SHA256: ${{ steps.contract.outputs.sha256 }}
          REQUESTED_MODE: ${{ inputs.mode || 'stale-default' }}
          REQUESTED_PATTERN: ${{ inputs.pattern }}
          REQUESTED_STALE_DAYS: ${{ inputs.stale_days || '90' }}
          REQUESTED_SINCE_DAYS: ${{ inputs.since_days || '30' }}
          REQUESTED_MAX_TURNS: ${{ inputs.max_turns }}
          REQUESTED_ALLOW_OPEN_PR: ${{ inputs.allow_open_verification_pr && 'true' || 'false' }}
          REQUESTED_CONFIRM_FULL: ${{ inputs.confirm_full_catalog && 'true' || 'false' }}
          REQUESTED_ALLOW_HIGH_COST_MODEL: ${{ inputs.allow_high_cost_model && 'true' || 'false' }}
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          python3 - <<'PY'
          import datetime
          import os
          import re
          import subprocess
          import sys

          providers = {"openai", "anthropic"}
          provider = os.environ["REQUESTED_PROVIDER"]
          if provider not in providers:
              sys.exit(f"unsupported provider: {provider!r}")
          model = os.environ[
              "OPENAI_MODEL" if provider == "openai" else "ANTHROPIC_MODEL"
          ].strip()
          if not re.fullmatch(r"[A-Za-z0-9][A-Za-z0-9._:/-]{0,99}", model):
              sys.exit("research model must be a safe, non-empty model identifier")
          contract_sha256 = os.environ["RESEARCH_CONTRACT_SHA256"]
          if not re.fullmatch(r"[0-9a-f]{64}", contract_sha256):
              sys.exit("research contract fingerprint must be a SHA-256 digest")
          prompt_versions = {
              "openai": "evidence-v2-openai-codex-v1",
              "anthropic": "evidence-v2-anthropic-claude-v1",
          }

          modes = {"stale-default", "full", "discover-only", "single-pattern"}
          if os.environ["EVENT_NAME"] == "workflow_dispatch" \
                  and os.environ["EVENT_REF"] != f"refs/heads/{os.environ['DEFAULT_BRANCH']}":
              sys.exit("manual verification must be dispatched from the default branch")
          mode = os.environ["REQUESTED_MODE"]
          if os.environ.get("SCHEDULE") == "0 6 1 * *":
              mode = "discover-only"
          if mode not in modes:
              sys.exit(f"unsupported mode: {mode!r}")

          def bounded_integer(name, raw, minimum, maximum, default=None):
              raw = raw.strip()
              if not raw and default is not None:
                  return default
              if not re.fullmatch(r"[0-9]+", raw):
                  sys.exit(f"{name} must be an integer")
              value = int(raw)
              if not minimum <= value <= maximum:
                  sys.exit(f"{name} must be between {minimum} and {maximum}")
              return value

          stale_days = bounded_integer(
              "stale_days", os.environ["REQUESTED_STALE_DAYS"], 1, 3650
          )
          since_days = bounded_integer(
              "since_days", os.environ["REQUESTED_SINCE_DAYS"], 1, 365
          )
          mode_turns = {"discover-only": 150}
          max_turns = bounded_integer(
              "max_turns",
              os.environ.get("REQUESTED_MAX_TURNS", ""),
              1,
              500,
              mode_turns.get(mode, 120),
          )

          pattern = os.environ.get("REQUESTED_PATTERN", "").strip()
          if mode == "single-pattern":
              if not pattern:
                  sys.exit("single-pattern mode requires an exact catalog pattern name")
          elif pattern:
              sys.exit("pattern may only be set in single-pattern mode")
          if "\n" in pattern or "\r" in pattern:
              sys.exit("pattern must be a single line")

          allow_open_verification_pr = os.environ["REQUESTED_ALLOW_OPEN_PR"]
          if allow_open_verification_pr not in {"true", "false"}:
              sys.exit("allow_open_verification_pr must be a boolean")
          if (allow_open_verification_pr == "true"
                  and os.environ["EVENT_NAME"] != "workflow_dispatch"):
              sys.exit("only a manual dispatch may allow an open verification PR")

          confirm_full_catalog = os.environ["REQUESTED_CONFIRM_FULL"]
          allow_high_cost_model = os.environ["REQUESTED_ALLOW_HIGH_COST_MODEL"]
          for name, value in (
                  ("confirm_full_catalog", confirm_full_catalog),
                  ("allow_high_cost_model", allow_high_cost_model)):
              if value not in {"true", "false"}:
                  sys.exit(f"{name} must be a boolean")
          if mode == "full" and confirm_full_catalog != "true":
              sys.exit(
                  "full mode requires confirm_full_catalog=true because it launches "
                  "one paid worker per available pattern plus discovery"
              )
          if confirm_full_catalog == "true" and (
                  os.environ["EVENT_NAME"] != "workflow_dispatch" or mode != "full"):
              sys.exit("confirm_full_catalog may only acknowledge a manual full run")

          cost_sensitive_openai_models = {
              "gpt-5.6-luna",
              "gpt-5.4-mini",
              "gpt-5.4-nano",
          }
          if allow_high_cost_model == "true" and (
                  os.environ["EVENT_NAME"] != "workflow_dispatch" or provider != "openai"):
              sys.exit("allow_high_cost_model may only be used by a manual OpenAI run")
          if (provider == "openai"
                  and model not in cost_sensitive_openai_models
                  and allow_high_cost_model != "true"):
              allowed = ", ".join(sorted(cost_sensitive_openai_models))
              sys.exit(
                  f"OpenAI model {model!r} is outside the reviewed cost-sensitive "
                  f"allowlist ({allowed}); a manual operator may explicitly set "
                  "allow_high_cost_model=true"
              )

          values = {
              "base_sha": subprocess.run(
                  ["git", "rev-parse", "HEAD"], check=True,
                  capture_output=True, text=True,
              ).stdout.strip(),
              "provider": provider,
              "model": model,
              "prompt_version": (
                  f"{prompt_versions[provider]}+sha256.{contract_sha256}"
              ),
              "mode": mode,
              "pattern": pattern,
              "stale_days": stale_days,
              "since_days": since_days,
              "checked_date": datetime.datetime.now(
                  datetime.timezone.utc).date().isoformat(),
              "max_turns": max_turns,
              "allow_open_verification_pr": allow_open_verification_pr,
          }
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              for key, value in values.items():
                  print(f"{key}={value}", file=output)
          PY

      - name: Collect in-flight evidence slugs
        env:
          GH_TOKEN: ${{ github.token }}
          ALLOW_OPEN_VERIFICATION_PR: ${{ steps.inputs.outputs.allow_open_verification_pr }}
        run: |
          set -euo pipefail
          mkdir -p verification/run-plan
          pull_list="$RUNNER_TEMP/open-pulls.tsv"
          pull_files="$RUNNER_TEMP/pull-files.txt"
          raw_slugs="$RUNNER_TEMP/inflight-slugs.txt"
          conflicting_pulls="$RUNNER_TEMP/conflicting-verification-pulls.txt"
          current_run_pulls="$RUNNER_TEMP/current-run-verification-pulls.txt"
          : > "$raw_slugs"
          : > "$conflicting_pulls"
          : > "$current_run_pulls"
          gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/pulls?state=open&per_page=100" \
            --jq '.[] | [.number, .head.ref, .head.repo.full_name] | @tsv' \
            > "$pull_list"
          while IFS=$'\t' read -r number head_ref head_repo; do
            [ "$head_repo" = "$GITHUB_REPOSITORY" ] || continue
            [[ "$head_ref" =~ ^verify/refresh-[0-9]+-[0-9]+$ ]] || continue
            if [[ "$head_ref" =~ ^verify/refresh-${GITHUB_RUN_ID}-[0-9]+$ ]]; then
              echo "#${number} (${head_ref})" >> "$current_run_pulls"
            else
              echo "#${number} (${head_ref})" >> "$conflicting_pulls"
            fi
            gh api --paginate \
              "repos/${GITHUB_REPOSITORY}/pulls/${number}/files?per_page=100" \
              --jq '.[].filename' > "$pull_files"
            while IFS= read -r path; do
              case "$path" in
                verification/evidence/*.yaml)
                  slug=${path#verification/evidence/}
                  slug=${slug%.yaml}
                  if [[ "$slug" != */* && "$slug" =~ ^[a-z0-9]+(-[a-z0-9]+)*$ ]]; then
                    echo "$slug" >> "$raw_slugs"
                  fi
                  ;;
              esac
            done < "$pull_files"
          done < "$pull_list"
          LC_ALL=C sort -u "$raw_slugs" > verification/run-plan/inflight-slugs.txt
          if [ -s "$current_run_pulls" ]; then
            echo "::error::This source run already has an open verification PR; rerun only failed jobs"
            cat "$current_run_pulls"
            exit 1
          fi
          if [ -s "$conflicting_pulls" ] \
              && [ "$ALLOW_OPEN_VERIFICATION_PR" != "true" ]; then
            echo "::error::An older verification PR is still open; merge or close it before starting another run"
            cat "$conflicting_pulls"
            exit 1
          fi
          if [ -s "$conflicting_pulls" ]; then
            echo "::warning::Manual override accepted; shared generated files may require a rebase"
          fi

      - name: Build deterministic inventory and worklist
        id: inventory
        env:
          MODE: ${{ steps.inputs.outputs.mode }}
          PATTERN: ${{ steps.inputs.outputs.pattern }}
          STALE_DAYS: ${{ steps.inputs.outputs.stale_days }}
          PROVIDER: ${{ steps.inputs.outputs.provider }}
          MODEL: ${{ steps.inputs.outputs.model }}
          MAX_TURNS: ${{ steps.inputs.outputs.max_turns }}
        run: |
          set -euo pipefail
          limit=10
          if [ "$MODE" = "full" ]; then limit=0; fi
          arguments=(
            --mode "$MODE"
            --stale-days "$STALE_DAYS"
            --limit "$limit"
            --inflight-slugs verification/run-plan/inflight-slugs.txt
            --inventory verification/run-plan/pattern-inventory.yaml
            --worklist verification/run-plan/worklist.txt
            --unit-dir verification/run-plan/units
            --matrix-output verification/run-plan/execution-matrix.json
            --json
          )
          if [ "$MODE" = "single-pattern" ]; then
            arguments+=(--pattern "$PATTERN")
          fi
          selected_slugs=$(python3 scripts/build-verification-inventory.py "${arguments[@]}")
          echo "selected_slugs=$selected_slugs" >> "$GITHUB_OUTPUT"
          export SELECTED_SLUGS="$selected_slugs"
          python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          matrix_path = Path("verification/run-plan/execution-matrix.json")
          matrix_bytes = matrix_path.read_bytes()
          matrix = json.loads(matrix_bytes)
          plan_id = hashlib.sha256(matrix_bytes).hexdigest()
          units = [unit for unit in matrix["include"] if unit["kind"] != "noop"]
          compact = json.dumps(matrix, separators=(",", ":"))
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(f"execution_matrix={compact}", file=output)
              print(f"plan_id={plan_id}", file=output)
              print(f"has_units={'true' if units else 'false'}", file=output)
              print(f"unit_count={len(units)}", file=output)
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              if units:
                  print("## Human approval required before paid research", file=summary)
                  print(
                      "No OpenAI or Anthropic preflight or research call will start until a "
                      "required reviewer approves the protected `evidence-paid-research` "
                      "environment. Reject the request, or leave it waiting, if the selected "
                      "work or cost envelope is not acceptable.",
                      file=summary,
                  )
                  print(
                      f"Provider/model: `{os.environ['PROVIDER']}` / `{os.environ['MODEL']}`",
                      file=summary,
                  )
                  print(
                      f"Approval authorizes one billable provider preflight and up to "
                      f"{len(units)} sequential paid worker(s) for this exact plan and attempt.",
                      file=summary,
                  )
              else:
                  print("## No paid research selected", file=summary)
                  print(
                      "No environment approval, provider preflight, or research call will occur.",
                      file=summary,
                  )
              print(f"Selected worklist JSON: {os.environ['SELECTED_SLUGS']}", file=summary)
              print(f"Execution plan SHA-256: `{plan_id}`", file=summary)
              print(f"Independent research units: {len(units)}", file=summary)
              if units and os.environ["PROVIDER"] == "openai":
                  weighted_limit = 300_000
                  input_rates = {
                      "gpt-5.6-luna": 1.00,
                      "gpt-5.4-mini": 0.75,
                      "gpt-5.4-nano": 0.20,
                  }
                  print(
                      "OpenAI worker stop: 300,000 weighted tokens "
                      "(non-cached input ×1, sampled output ×6.25), low reasoning, "
                      "one worker at a time, fail-fast.",
                      file=summary,
                  )
                  rate = input_rates.get(os.environ["MODEL"])
                  if rate is not None:
                      envelope = len(units) * weighted_limit / 1_000_000 * rate
                      print(
                          f"Approximate short-context non-cached token envelope: "
                          f"${envelope:.2f} for {len(units)} unit(s).",
                          file=summary,
                      )
                  else:
                      print(
                          "No reviewed dollar estimate is available for this OpenAI model; "
                          "verify current pricing before approval.",
                          file=summary,
                      )
                  print(
                      "This is not a hard dollar cap: one response may cross the stop, "
                      "and cached input, web search, and long-context premiums are separate.",
                      file=summary,
                  )
              elif units:
                  print(
                      f"Anthropic worker bounds: at most {os.environ['MAX_TURNS']} turns and "
                      "12 requested live searches per unit, one worker at a time, fail-fast.",
                      file=summary,
                  )
                  print(
                      "No reviewed dollar estimate is available for Anthropic; verify current "
                      "model and tool pricing before approval.",
                      file=summary,
                  )
          PY

      - name: Upload deterministic research plan
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: verification-research-plan-${{ steps.inventory.outputs.plan_id }}
          path: verification/run-plan/
          if-no-files-found: error
          retention-days: 7
          overwrite: true

  authorize-paid-research:
    name: Human approval for paid research
    needs: prepare
    if: >-
      needs.prepare.result == 'success' &&
      needs.prepare.outputs.has_units == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: evidence-paid-research
      deployment: false
    permissions:
      actions: read # Reads the environment rule to fail closed before paid calls.
    outputs:
      approved_attempt: ${{ steps.authorization.outputs.approved_attempt }}
      approved_plan_id: ${{ steps.authorization.outputs.approved_plan_id }}
    steps:
      - name: Verify approval environment remains protected
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          environment=$(gh api \
            "repos/${GITHUB_REPOSITORY}/environments/evidence-paid-research")
          if ! jq -e --arg owner "$GITHUB_REPOSITORY_OWNER" '
            any(.protection_rules[]?;
              .type == "required_reviewers" and
              any(.reviewers[]?;
                .type == "User" and
                (.reviewer.login | ascii_downcase) == ($owner | ascii_downcase)))
            and .deployment_branch_policy.protected_branches == true
            and .deployment_branch_policy.custom_branch_policies == false
            and .can_admins_bypass == false
          ' <<< "$environment" > /dev/null; then
            echo "::error::evidence-paid-research must require the repository owner, protected branches, and no admin bypass"
            exit 1
          fi

      - name: Bind human authorization to this plan and run attempt
        id: authorization
        env:
          PROVIDER: ${{ needs.prepare.outputs.provider }}
          MODEL: ${{ needs.prepare.outputs.model }}
          PLAN_ID: ${{ needs.prepare.outputs.plan_id }}
          UNIT_COUNT: ${{ needs.prepare.outputs.unit_count }}
        run: |
          echo "approved_attempt=attempt-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"
          echo "approved_plan_id=$PLAN_ID" >> "$GITHUB_OUTPUT"
          {
            echo "## Paid research authorized"
            echo "A required reviewer approved \`evidence-paid-research\`."
            echo "Provider/model: \`$PROVIDER\` / \`$MODEL\`"
            echo "Independent research units: $UNIT_COUNT"
          } >> "$GITHUB_STEP_SUMMARY"

  preflight-openai:
    name: Preflight OpenAI provider
    needs: [prepare, authorize-paid-research]
    if: >-
      needs.prepare.outputs.provider == 'openai' &&
      needs.authorize-paid-research.result == 'success' &&
      needs.authorize-paid-research.outputs.approved_plan_id == needs.prepare.outputs.plan_id &&
      needs.authorize-paid-research.outputs.approved_attempt == format('attempt-{0}', github.run_attempt) &&
      needs.prepare.outputs.has_units == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout trusted base revision
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.prepare.outputs.base_sha }}
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Verify OpenAI credential, model, and quota
        env:
          OPENAI_API_KEY: ${{ secrets.EVIDENCE_OPENAI_API_KEY }}
          PROVIDER_MODEL: ${{ needs.prepare.outputs.model }}
        run: >-
          python3 scripts/check-provider-preflight.py
          --provider openai
          --model "$PROVIDER_MODEL"

  preflight-anthropic:
    name: Preflight Anthropic provider
    needs: [prepare, authorize-paid-research]
    if: >-
      needs.prepare.outputs.provider == 'anthropic' &&
      needs.authorize-paid-research.result == 'success' &&
      needs.authorize-paid-research.outputs.approved_plan_id == needs.prepare.outputs.plan_id &&
      needs.authorize-paid-research.outputs.approved_attempt == format('attempt-{0}', github.run_attempt) &&
      needs.prepare.outputs.has_units == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write # Exchanges optional Anthropic workload identity federation credentials.
    steps:
      - name: Checkout trusted base revision
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.prepare.outputs.base_sha }}
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Verify Anthropic API-key credential, model, and quota
        if: vars.ANTHROPIC_FEDERATION_RULE_ID == ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROVIDER_MODEL: ${{ needs.prepare.outputs.model }}
        run: >-
          python3 scripts/check-provider-preflight.py
          --provider anthropic
          --model "$PROVIDER_MODEL"

      - name: Probe Anthropic workload identity, model, and quota
        id: anthropic-federation-preflight
        if: vars.ANTHROPIC_FEDERATION_RULE_ID != ''
        uses: anthropics/claude-code-action@a6a5b60a078a0af52612aac63e05e3f95fd4ff64 # v1
        with:
          github_token: ${{ github.token }}
          anthropic_api_key: >-
            ${{ vars.ANTHROPIC_FEDERATION_RULE_ID == '' && secrets.ANTHROPIC_API_KEY || '' }}
          anthropic_federation_rule_id: ${{ vars.ANTHROPIC_FEDERATION_RULE_ID }}
          anthropic_organization_id: ${{ vars.ANTHROPIC_ORGANIZATION_ID }}
          anthropic_service_account_id: ${{ vars.ANTHROPIC_SERVICE_ACCOUNT_ID }}
          anthropic_workspace_id: ${{ vars.ANTHROPIC_WORKSPACE_ID }}
          prompt: >-
            Reply with exactly PREFLIGHT_OK. Do not inspect or modify the repository.
          claude_args: >-
            --model ${{ needs.prepare.outputs.model }}
            --max-turns 1
            --permission-mode dontAsk
            --tools ""
            --strict-mcp-config
            --disallowedTools "mcp__*"

      - name: Require successful Anthropic workload-identity preflight
        if: vars.ANTHROPIC_FEDERATION_RULE_ID != ''
        env:
          CLAUDE_EXECUTION_FILE: ${{ steps.anthropic-federation-preflight.outputs.execution_file }}
        run: python3 scripts/check-claude-execution.py

  research-openai:
    name: OpenAI research (${{ matrix.unit_id }})
    needs: [prepare, authorize-paid-research, preflight-openai]
    if: >-
      needs.prepare.outputs.provider == 'openai' &&
      needs.authorize-paid-research.result == 'success' &&
      needs.authorize-paid-research.outputs.approved_plan_id == needs.prepare.outputs.plan_id &&
      needs.authorize-paid-research.outputs.approved_attempt == format('attempt-{0}', github.run_attempt) &&
      needs.preflight-openai.result == 'success' &&
      needs.prepare.outputs.has_units == 'true'
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix: ${{ fromJSON(needs.prepare.outputs.execution_matrix) }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout without persisted credentials
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.prepare.outputs.base_sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Restore same-run fixed-path research checkpoint
        id: research-checkpoint
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: candidate-unit
          key: >-
            verification-unit-${{ github.run_id }}-${{ needs.prepare.outputs.plan_id }}-${{ matrix.unit_id }}
          fail-on-cache-miss: false

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Build read-only research Python environment
        run: |
          set -euo pipefail
          sudo "$(command -v python3)" -m venv /opt/evidence-python
          sudo /opt/evidence-python/bin/python -m pip install \
            --requirement tests/requirements.txt
          sudo chown -hR root:root /opt/evidence-python
          sudo chmod -R a=rX /opt/evidence-python

      - name: Download deterministic research plan
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: verification-research-plan-${{ needs.prepare.outputs.plan_id }}
          path: verification/run-plan

      - name: Activate exact research unit
        env:
          UNIT_ID: ${{ matrix.unit_id }}
        run: >-
          python3 scripts/activate-verification-unit.py
          --matrix verification/run-plan/execution-matrix.json
          --unit-id "$UNIT_ID"
          --destination verification/run-plan/worklist.txt

      - name: Prepare isolated OpenAI research account
        env:
          UNIT_KIND: ${{ matrix.kind }}
          UNIT_SLUG: ${{ matrix.slug }}
        run: |
          set -euo pipefail
          sudo adduser \
            --system --home /home/evidence-agent --shell /bin/bash \
            --group evidence-agent
          sudo install -d -o evidence-agent -g evidence-agent -m 0750 \
            /home/evidence-agent/workspace
          # Keep CODEX_HOME root-owned, but precreate the two exact runtime
          # paths Codex 0.144.1 must write before it can launch its sandbox.
          sudo install -d -o root -g root -m 0755 \
            /home/evidence-agent/.codex
          sudo install -d -o root -g root -m 0755 \
            /home/evidence-agent/.codex/tmp
          sudo install -d -o evidence-agent -g evidence-agent -m 0700 \
            /home/evidence-agent/.codex/tmp/arg0
          sudo install -o evidence-agent -g evidence-agent -m 0644 \
            /dev/null /home/evidence-agent/.codex/installation_id
          /usr/bin/tar \
            --exclude='./.git' --exclude='./.beads' -cf - . \
            | sudo -u evidence-agent /usr/bin/tar \
                -xf - -C /home/evidence-agent/workspace
          workspace=/home/evidence-agent/workspace
          sudo chown -hR root:root "$workspace"
          sudo chmod -R a=rX "$workspace"
          for metadata in .git .agents .codex .beads; do
            path="$workspace/$metadata"
            if [ -e "$path" ] || [ -L "$path" ]; then
              echo "::error::Isolated metadata sentinel already exists: $metadata"
              exit 1
            fi
            sudo install -d -o root -g root -m 0555 "$path"
          done
          case "$UNIT_KIND" in
            evidence)
              [[ "$UNIT_SLUG" =~ ^[a-z0-9]+(-[a-z0-9]+)*$ ]]
              relative="verification/evidence/${UNIT_SLUG}.yaml"
              ;;
            discovery)
              [ -z "$UNIT_SLUG" ]
              relative="experiments/NOTES.md"
              ;;
            *)
              echo "::error::Unsupported research unit kind: $UNIT_KIND"
              exit 1
              ;;
          esac
          path="$workspace/$relative"
          if [ -L "$path" ] || { [ -e "$path" ] && [ ! -f "$path" ]; }; then
            echo "::error::Writable unit path must be a regular file: $relative"
            exit 1
          fi
          if [ ! -e "$path" ]; then
            sudo install -o evidence-agent -g evidence-agent -m 0640 /dev/null "$path"
          else
            sudo chown evidence-agent:evidence-agent "$path"
            sudo chmod 0640 "$path"
          fi
          sudo install -o root -g root -m 0644 \
            .github/codex/evidence-research.toml \
            /home/evidence-agent/.codex/config.toml
          sudo install -o root -g root -m 0666 \
            /dev/null "/home/evidence-agent/.codex/${GITHUB_RUN_ID}.json"
          sudo chown root:root /home/evidence-agent
          sudo chmod 0755 /home/evidence-agent

      - name: Verify isolated research write boundary
        env:
          UNIT_KIND: ${{ matrix.kind }}
          UNIT_SLUG: ${{ matrix.slug }}
        run: |
          set -euo pipefail
          if [ "$UNIT_KIND" = "evidence" ]; then
            relative="verification/evidence/${UNIT_SLUG}.yaml"
          else
            relative="experiments/NOTES.md"
          fi
          sudo -u evidence-agent python3 \
            /home/evidence-agent/workspace/scripts/check-research-workspace.py \
            /home/evidence-agent/workspace \
            --writable-file "$relative"

      - name: Set up Node.js 24 for Codex sandbox preflight
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"

      - name: Smoke-test pinned Codex permission profile without credentials
        run: | # zizmor: ignore[adhoc-packages] pinned to action CLI version
          set -euo pipefail
          npm install --global "@openai/codex@0.144.1"
          current_userns=$(sysctl -n kernel.unprivileged_userns_clone 2>/dev/null || true)
          if [ -n "$current_userns" ] && [ "$current_userns" != "1" ]; then
            sudo sysctl -w kernel.unprivileged_userns_clone=1
          fi
          current_apparmor=$(
            sysctl -n kernel.apparmor_restrict_unprivileged_userns 2>/dev/null || true
          )
          if [ -n "$current_apparmor" ] && [ "$current_apparmor" != "0" ]; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi

          codex_bin=$(command -v codex)
          node_dir=$(dirname "$(command -v node)")
          sanitized_env=(
            HOME=/home/evidence-agent
            CODEX_HOME=/home/evidence-agent/.codex
            PATH="$node_dir:/usr/bin:/bin"
          )
          sudo -u evidence-agent env -i "${sanitized_env[@]}" \
            timeout 30s "$codex_bin" mcp-server --strict-config </dev/null
          sudo -u evidence-agent test -s \
            /home/evidence-agent/.codex/installation_id
          missing_thread=00000000-0000-4000-8000-000000000001
          set +e
          startup_output=$(
            sudo -u evidence-agent env -i "${sanitized_env[@]}" \
              timeout 30s "$codex_bin" exec \
                --skip-git-repo-check \
                --cd /home/evidence-agent/workspace \
                --ephemeral --strict-config \
                --config 'default_permissions="evidence-research"' \
                resume "$missing_thread" 'startup smoke' 2>&1
          )
          startup_status=$?
          set -e
          printf '%s\n' "$startup_output"
          if [ "$startup_status" -eq 124 ]; then
            echo "::error::Codex startup smoke timed out"
            exit 1
          fi
          if [ "$startup_status" -eq 0 ]; then
            echo "::error::Missing-thread startup smoke unexpectedly succeeded"
            exit 1
          fi
          expected="no rollout found for thread id $missing_thread"
          if ! grep -Fq "$expected" <<<"$startup_output"; then
            echo "::error::Codex did not reach initialized thread/resume handling"
            exit 1
          fi
          if grep -Eq \
              'could not create PATH aliases|failed to initialize in-process app-server client' \
              <<<"$startup_output"; then
            echo "::error::Codex CODEX_HOME startup initialization failed"
            exit 1
          fi
          sudo -u evidence-agent env -i "${sanitized_env[@]}" \
            timeout 30s "$codex_bin" sandbox \
              --permission-profile evidence-research \
              --cd /home/evidence-agent/workspace \
              -- python3 -c \
                'import bs4, requests, sys, yaml; assert sys.version_info >= (3, 11)'
          if sudo -u evidence-agent env -i "${sanitized_env[@]}" \
              timeout 30s "$codex_bin" sandbox \
                --permission-profile evidence-research \
                --cd /home/evidence-agent/workspace \
                -- /usr/bin/touch /home/evidence-agent/.codex/installation_id; then
            echo "::error::Sandbox wrote outside the isolated workspace"
            exit 1
          fi

      # This is the only OpenAI model step. The action's internal GitHub token
      # is read-scoped; direct git/gh publication is forbidden and separate.
      - name: Collect candidate evidence with OpenAI
        id: research
        if: steps.research-checkpoint.outputs.cache-hit != 'true'
        uses: openai/codex-action@52fe01ec70a42f454c9d2ebd47598f9fd6893d56 # v1
        with:
          openai-api-key: ${{ secrets.EVIDENCE_OPENAI_API_KEY }}
          codex-version: "0.144.1"
          codex-home: /home/evidence-agent/.codex
          working-directory: /home/evidence-agent/workspace
          model: ${{ needs.prepare.outputs.model }}
          effort: low
          permission-profile: evidence-research
          safety-strategy: unprivileged-user
          codex-user: evidence-agent
          codex-args: '["--ephemeral", "--strict-config"]'
          prompt: |
            Use .claude/commands/verify-patterns.md as the research and evidence methodology.

            This is one independently isolated unit of a larger candidate-only run. GitHub
            Actions, not the agent, owns shared-state updates and publication. Complete this
            unit only; do not continue to any other catalog pattern.
            Do not create branches, commits, pull requests, labels, or issues. Do not invoke
            git or gh. Do not inspect environment variables, process memory/metadata, or runner
            credential files. Do not modify workflows, scripts, tests, patterns.yaml, README,
            site files, status, pending state, or decisions. For an evidence unit, modify only
            the single YAML named by the active worklist. For a discovery unit, modify only
            experiments/NOTES.md. Trusted jobs assemble shared files after every unit validates.

            Parent requested mode: ${{ needs.prepare.outputs.mode }}
            Unit kind: ${{ matrix.kind }}
            Unit slug (empty for discovery): ${{ matrix.slug }}
            Exact pattern (empty unless single-pattern): ${{ needs.prepare.outputs.pattern }}
            Stale threshold: ${{ needs.prepare.outputs.stale_days }} days
            Discovery lookback: ${{ needs.prepare.outputs.since_days }} days
            This unit's complete and authoritative selected slugs: ${{ matrix.selected_slugs_json }}
            Actual research provider: ${{ needs.prepare.outputs.provider }}
            Actual research model: ${{ needs.prepare.outputs.model }}
            Required evidence run_id: github-actions:${{ github.run_id }}
            Required last_checked date: ${{ needs.prepare.outputs.checked_date }}
            Required search and verifier run_url:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Every complete file must set search.provider to exactly
            ${{ needs.prepare.outputs.provider }}, search.model to exactly
            ${{ needs.prepare.outputs.model }}, and search.prompt_version to exactly
            ${{ needs.prepare.outputs.prompt_version }}.
            Every admitted entry must set verifier.method to automated,
            verifier.model to exactly ${{ needs.prepare.outputs.model }}, and
            verifier.prompt_version to exactly ${{ needs.prepare.outputs.prompt_version }},
            with verifier.run_url equal to the required run URL above.

            The active verification/run-plan/worklist.txt is immutable and is the entire scope
            for this invocation even when the parent mode is full. Do not add patterns to it.
            Do not edit any pre-existing evidence file that is not named there.
            Make at most 12 live web-search calls for this unit. Stop searching as soon as the
            required modes and evidence-admission decision are supported; keep tool output and
            the final report concise.
            For every admitted source, provide a concrete public URL and an exact mechanism quote
            present on that page. Trusted post-processing, not your tools, derives resolved_url
            and content_sha256; never invent either value.

      - name: Terminate isolated research processes and proxy
        if: always()
        run: |
          set -euo pipefail
          if id evidence-agent >/dev/null 2>&1; then
            research_uid=$(id -u evidence-agent)
            sudo pkill -KILL -u "$research_uid" 2>/dev/null || true
            for _ in {1..20}; do
              if ! sudo pgrep -u "$research_uid" >/dev/null 2>&1; then break; fi
              sleep 0.1
            done
            if sudo pgrep -u "$research_uid" >/dev/null 2>&1; then
              echo "::error::Untrusted research processes survived cleanup"
              exit 1
            fi
          fi
          runner_uid=$(id -u runner)
          sudo pkill -KILL -u "$runner_uid" -f '[c]odex-responses-api-proxy' \
            2>/dev/null || true
          for _ in {1..20}; do
            if ! sudo pgrep -u "$runner_uid" -f '[c]odex-responses-api-proxy' \
                >/dev/null 2>&1; then break; fi
            sleep 0.1
          done
          if sudo pgrep -u "$runner_uid" -f '[c]odex-responses-api-proxy' \
              >/dev/null 2>&1; then
            echo "::error::Codex Responses API proxy survived cleanup"
            exit 1
          fi
          if [ -e /home/evidence-agent/workspace ]; then
            sudo chown -hR runner:runner /home/evidence-agent/workspace
          fi

      - name: Hydrate trusted evidence retrieval metadata
        if: >-
          steps.research-checkpoint.outputs.cache-hit != 'true' &&
          matrix.kind == 'evidence'
        env:
          UNIT_SLUG: ${{ matrix.slug }}
          CHECKED_DATE: ${{ needs.prepare.outputs.checked_date }}
        run: >-
          /opt/evidence-python/bin/python
          scripts/hydrate-evidence-content.py
          "/home/evidence-agent/workspace/verification/evidence/${UNIT_SLUG}.yaml"
          --retrieved-date "$CHECKED_DATE"

      - name: Export isolated fixed-path research unit
        if: steps.research-checkpoint.outputs.cache-hit != 'true'
        env:
          UNIT_ID: ${{ matrix.unit_id }}
          UNIT_KIND: ${{ matrix.kind }}
          UNIT_SLUG: ${{ matrix.slug }}
          BASE_SHA: ${{ needs.prepare.outputs.base_sha }}
          RESEARCH_PROVIDER: ${{ needs.prepare.outputs.provider }}
          RESEARCH_MODEL: ${{ needs.prepare.outputs.model }}
          RESEARCH_PROMPT_VERSION: ${{ needs.prepare.outputs.prompt_version }}
          RUN_ID: github-actions:${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 scripts/export-verification-unit.py \
            /home/evidence-agent/workspace candidate-unit \
            --unit-id "$UNIT_ID" \
            --kind "$UNIT_KIND" \
            --slug "$UNIT_SLUG" \
            --base-sha "$BASE_SHA" \
            --provider "$RESEARCH_PROVIDER" \
            --model "$RESEARCH_MODEL" \
            --prompt-version "$RESEARCH_PROMPT_VERSION" \
            --run-id "$RUN_ID" \
            --run-url "$RUN_URL"

      - name: Scan fixed-path research unit
        if: steps.research-checkpoint.outputs.cache-hit != 'true'
        env:
          EXPECTED_SCANNER_SHA256: ${{ needs.prepare.outputs.scanner_sha256 }}
        run: |
          set -euo pipefail
          actual=$(sha256sum scripts/scan-candidate-secrets.py | cut -d ' ' -f 1)
          if [ "$actual" != "$EXPECTED_SCANNER_SHA256" ]; then
            echo "::error::Research modified the trusted candidate scanner"
            exit 1
          fi
          python3 scripts/scan-candidate-secrets.py candidate-unit

      - name: Save same-run fixed-path research checkpoint
        if: steps.research-checkpoint.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: candidate-unit
          key: >-
            verification-unit-${{ github.run_id }}-${{ needs.prepare.outputs.plan_id }}-${{ matrix.unit_id }}

      - name: Upload fixed-path research unit
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: verification-unit-${{ needs.prepare.outputs.plan_id }}-${{ matrix.unit_id }}
          path: candidate-unit/
          if-no-files-found: error
          retention-days: 7
          overwrite: true

  research-anthropic:
    name: Anthropic research (${{ matrix.unit_id }})
    needs: [prepare, authorize-paid-research, preflight-anthropic]
    if: >-
      needs.prepare.outputs.provider == 'anthropic' &&
      needs.authorize-paid-research.result == 'success' &&
      needs.authorize-paid-research.outputs.approved_plan_id == needs.prepare.outputs.plan_id &&
      needs.authorize-paid-research.outputs.approved_attempt == format('attempt-{0}', github.run_attempt) &&
      needs.preflight-anthropic.result == 'success' &&
      needs.prepare.outputs.has_units == 'true'
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix: ${{ fromJSON(needs.prepare.outputs.execution_matrix) }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write # Exchanges optional Anthropic workload identity federation credentials.
    steps:
      - name: Checkout without persisted credentials
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.prepare.outputs.base_sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Restore same-run fixed-path research checkpoint
        id: research-checkpoint
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ runner.temp }}/candidate-unit
          key: >-
            verification-unit-${{ github.run_id }}-${{ needs.prepare.outputs.plan_id }}-${{ matrix.unit_id }}
          fail-on-cache-miss: false

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install local validation dependencies
        run: python3 -m pip install --requirement tests/requirements.txt

      - name: Install immutable Anthropic research tools
        run: |
          set -euo pipefail
          sudo install -d -o root -g root -m 0755 /opt/evidence-tools
          for script in \
            check-claude-execution.py \
            evidence_content.py \
            export-verification-unit.py \
            hydrate-evidence-content.py \
            scan-candidate-secrets.py \
            validate-research-scope.py; do
            sudo install -o root -g root -m 0555 \
              "scripts/$script" "/opt/evidence-tools/$script"
          done
          sudo chmod 0555 /opt/evidence-tools

      - name: Download deterministic research plan
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: verification-research-plan-${{ needs.prepare.outputs.plan_id }}
          path: verification/run-plan

      - name: Activate exact research unit
        env:
          UNIT_ID: ${{ matrix.unit_id }}
        run: >-
          python3 scripts/activate-verification-unit.py
          --matrix verification/run-plan/execution-matrix.json
          --unit-id "$UNIT_ID"
          --destination verification/run-plan/worklist.txt

      - name: Restrict Anthropic checkout to the exact unit path
        id: anthropic-boundary
        env:
          UNIT_KIND: ${{ matrix.kind }}
          UNIT_SLUG: ${{ matrix.slug }}
        run: |
          set -euo pipefail
          workspace="$GITHUB_WORKSPACE"
          # The action performs trusted, read-only git inspection after the
          # checkout becomes root-owned. Mark only this exact checkout safe so
          # git does not reject it solely because of the ownership boundary.
          git config --global --add safe.directory "$workspace"
          sudo chown -hR root:root "$workspace"
          sudo chmod -R a=rX "$workspace"
          if [ "$UNIT_KIND" = "evidence" ]; then
            [[ "$UNIT_SLUG" =~ ^[a-z0-9]+(-[a-z0-9]+)*$ ]]
            relative="verification/evidence/${UNIT_SLUG}.yaml"
          elif [ "$UNIT_KIND" = "discovery" ] && [ -z "$UNIT_SLUG" ]; then
            relative="experiments/NOTES.md"
          else
            echo "::error::Unsupported Anthropic research unit"
            exit 1
          fi
          path="$workspace/$relative"
          if [ -L "$path" ] || { [ -e "$path" ] && [ ! -f "$path" ]; }; then
            echo "::error::Writable unit path must be a regular file: $relative"
            exit 1
          fi
          if [ ! -e "$path" ]; then
            sudo install -o "$(id -u)" -g "$(id -g)" -m 0640 /dev/null "$path"
          else
            sudo chown "$(id -u):$(id -g)" "$path"
            chmod 0640 "$path"
          fi
          echo "edit_rule=Edit(/${relative})" >> "$GITHUB_OUTPUT"

      # This is the only Anthropic model step. It receives only a read-scoped
      # repository token; publication credentials remain in a separate job.
      - name: Collect candidate evidence with Anthropic
        id: research
        if: steps.research-checkpoint.outputs.cache-hit != 'true'
        uses: anthropics/claude-code-action@a6a5b60a078a0af52612aac63e05e3f95fd4ff64 # v1
        with:
          github_token: ${{ github.token }}
          anthropic_api_key: >-
            ${{ vars.ANTHROPIC_FEDERATION_RULE_ID == '' && secrets.ANTHROPIC_API_KEY || '' }}
          anthropic_federation_rule_id: ${{ vars.ANTHROPIC_FEDERATION_RULE_ID }}
          anthropic_organization_id: ${{ vars.ANTHROPIC_ORGANIZATION_ID }}
          anthropic_service_account_id: ${{ vars.ANTHROPIC_SERVICE_ACCOUNT_ID }}
          anthropic_workspace_id: ${{ vars.ANTHROPIC_WORKSPACE_ID }}
          prompt: |
            Use .claude/commands/verify-patterns.md as the research and evidence methodology.

            This is one independently isolated unit of a larger candidate-only run. GitHub
            Actions, not the agent, owns shared-state updates and publication. Complete this
            unit only; do not continue to any other catalog pattern.
            Do not create branches, commits, pull requests, labels, or issues. Do not invoke
            git or gh. Do not inspect environment variables, process memory/metadata, or runner
            credential files. Do not modify workflows, scripts, tests, patterns.yaml, README,
            site files, status, pending state, or decisions. For an evidence unit, modify only
            the single YAML named by the active worklist. For a discovery unit, modify only
            experiments/NOTES.md. Trusted jobs assemble shared files after every unit validates.

            Parent requested mode: ${{ needs.prepare.outputs.mode }}
            Unit kind: ${{ matrix.kind }}
            Unit slug (empty for discovery): ${{ matrix.slug }}
            Exact pattern (empty unless single-pattern): ${{ needs.prepare.outputs.pattern }}
            Stale threshold: ${{ needs.prepare.outputs.stale_days }} days
            Discovery lookback: ${{ needs.prepare.outputs.since_days }} days
            This unit's complete and authoritative selected slugs: ${{ matrix.selected_slugs_json }}
            Actual research provider: ${{ needs.prepare.outputs.provider }}
            Actual research model: ${{ needs.prepare.outputs.model }}
            Required evidence run_id: github-actions:${{ github.run_id }}
            Required last_checked date: ${{ needs.prepare.outputs.checked_date }}
            Required search and verifier run_url:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Every complete file must set search.provider to exactly
            ${{ needs.prepare.outputs.provider }}, search.model to exactly
            ${{ needs.prepare.outputs.model }}, and search.prompt_version to exactly
            ${{ needs.prepare.outputs.prompt_version }}.
            Every admitted entry must set verifier.method to automated,
            verifier.model to exactly ${{ needs.prepare.outputs.model }}, and
            verifier.prompt_version to exactly ${{ needs.prepare.outputs.prompt_version }},
            with verifier.run_url equal to the required run URL above.

            The active verification/run-plan/worklist.txt is immutable and is the entire scope
            for this invocation even when the parent mode is full. Do not add patterns to it.
            Do not edit any pre-existing evidence file that is not named there.
            Make at most 12 live web-search calls for this unit. Stop searching as soon as the
            required modes and evidence-admission decision are supported; keep tool output and
            the final report concise.
            For every admitted source, provide a concrete public URL and an exact mechanism quote
            present on that page. Trusted post-processing, not your tools, derives resolved_url
            and content_sha256; never invent either value.
          claude_args: >-
            --model ${{ needs.prepare.outputs.model }}
            --max-turns ${{ needs.prepare.outputs.max_turns }}
            --permission-mode dontAsk
            --tools "Read,Edit,WebSearch,WebFetch"
            --strict-mcp-config
            --disallowedTools "mcp__*"
            --allowedTools
            "Read(/**),${{ steps.anthropic-boundary.outputs.edit_rule }},WebSearch,WebFetch"

      # claude-code-action currently keys its conclusion only off the result
      # subtype. Fail closed on contradictory success + is_error output while
      # keeping the raw execution transcript out of logs and artifacts.
      - name: Require successful Claude execution
        if: steps.research-checkpoint.outputs.cache-hit != 'true'
        env:
          CLAUDE_EXECUTION_FILE: ${{ steps.research.outputs.execution_file }}
        run: python3 /opt/evidence-tools/check-claude-execution.py

      - name: Hydrate trusted evidence retrieval metadata
        if: >-
          steps.research-checkpoint.outputs.cache-hit != 'true' &&
          matrix.kind == 'evidence'
        env:
          UNIT_SLUG: ${{ matrix.slug }}
          CHECKED_DATE: ${{ needs.prepare.outputs.checked_date }}
        run: >-
          python3 /opt/evidence-tools/hydrate-evidence-content.py
          "verification/evidence/${UNIT_SLUG}.yaml"
          --retrieved-date "$CHECKED_DATE"

      - name: Validate proposed research unit scope
        if: steps.research-checkpoint.outputs.cache-hit != 'true'
        env:
          UNIT_KIND: ${{ matrix.kind }}
          SELECTED_SLUGS: ${{ matrix.selected_slugs_json }}
          EXPECTED_RUN_ID: github-actions:${{ github.run_id }}
          EXPECTED_CHECKED_DATE: ${{ needs.prepare.outputs.checked_date }}
          EXPECTED_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EXPECTED_PROVIDER: ${{ needs.prepare.outputs.provider }}
          EXPECTED_MODEL: ${{ needs.prepare.outputs.model }}
          EXPECTED_PROMPT_VERSION: ${{ needs.prepare.outputs.prompt_version }}
        run: |
          python3 /opt/evidence-tools/validate-research-scope.py \
            --kind "$UNIT_KIND" \
            --selected-json "$SELECTED_SLUGS" \
            --expected-run-id "$EXPECTED_RUN_ID" \
            --expected-checked-date "$EXPECTED_CHECKED_DATE" \
            --expected-run-url "$EXPECTED_RUN_URL" \
            --expected-provider "$EXPECTED_PROVIDER" \
            --expected-model "$EXPECTED_MODEL" \
            --expected-prompt-version "$EXPECTED_PROMPT_VERSION"

      - name: Export fixed-path research unit
        if: steps.research-checkpoint.outputs.cache-hit != 'true'
        env:
          UNIT_ID: ${{ matrix.unit_id }}
          UNIT_KIND: ${{ matrix.kind }}
          UNIT_SLUG: ${{ matrix.slug }}
          BASE_SHA: ${{ needs.prepare.outputs.base_sha }}
          RESEARCH_PROVIDER: ${{ needs.prepare.outputs.provider }}
          RESEARCH_MODEL: ${{ needs.prepare.outputs.model }}
          RESEARCH_PROMPT_VERSION: ${{ needs.prepare.outputs.prompt_version }}
          RUN_ID: github-actions:${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 /opt/evidence-tools/export-verification-unit.py \
            "$GITHUB_WORKSPACE" "$RUNNER_TEMP/candidate-unit" \
            --unit-id "$UNIT_ID" \
            --kind "$UNIT_KIND" \
            --slug "$UNIT_SLUG" \
            --base-sha "$BASE_SHA" \
            --provider "$RESEARCH_PROVIDER" \
            --model "$RESEARCH_MODEL" \
            --prompt-version "$RESEARCH_PROMPT_VERSION" \
            --run-id "$RUN_ID" \
            --run-url "$RUN_URL"

      - name: Scan fixed-path research unit
        if: steps.research-checkpoint.outputs.cache-hit != 'true'
        env:
          EXPECTED_SCANNER_SHA256: ${{ needs.prepare.outputs.scanner_sha256 }}
        run: |
          set -euo pipefail
          actual=$(sha256sum /opt/evidence-tools/scan-candidate-secrets.py | cut -d ' ' -f 1)
          if [ "$actual" != "$EXPECTED_SCANNER_SHA256" ]; then
            echo "::error::Research modified the trusted candidate scanner"
            exit 1
          fi
          python3 /opt/evidence-tools/scan-candidate-secrets.py \
            "$RUNNER_TEMP/candidate-unit"

      - name: Save same-run fixed-path research checkpoint
        if: steps.research-checkpoint.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ runner.temp }}/candidate-unit
          key: >-
            verification-unit-${{ github.run_id }}-${{ needs.prepare.outputs.plan_id }}-${{ matrix.unit_id }}

      - name: Upload fixed-path research unit
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: verification-unit-${{ needs.prepare.outputs.plan_id }}-${{ matrix.unit_id }}
          path: ${{ runner.temp }}/candidate-unit/
          if-no-files-found: error
          retention-days: 7
          overwrite: true

      - name: Restore Anthropic checkout ownership
        if: always()
        run: sudo chown -hR runner:runner "$GITHUB_WORKSPACE"

  validate-candidate:
    name: Validate unit (${{ matrix.unit_id }})
    needs: [prepare, research-openai, research-anthropic]
    if: >-
      !cancelled() && needs.prepare.result == 'success' &&
      ((needs.prepare.outputs.provider == 'openai' &&
      needs.research-openai.result == 'success') ||
      (needs.prepare.outputs.provider == 'anthropic' &&
      needs.research-anthropic.result == 'success'))
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix: ${{ fromJSON(needs.prepare.outputs.execution_matrix) }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout trusted base revision
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.prepare.outputs.base_sha }}
          persist-credentials: false

      - name: Download candidate unit
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: verification-unit-${{ needs.prepare.outputs.plan_id }}-${{ matrix.unit_id }}
          path: candidate-unit

      - name: Reject unsafe unit artifact entries
        env:
          UNIT_KIND: ${{ matrix.kind }}
          UNIT_SLUG: ${{ matrix.slug }}
        run: |
          set -euo pipefail
          if [ "$UNIT_KIND" = "evidence" ]; then
            expected="verification/evidence/${UNIT_SLUG}.yaml"
          else
            expected="experiments/NOTES.md"
          fi
          total=0
          seen_manifest=false
          seen_candidate=false
          while IFS= read -r -d '' path; do
            if [ -L "$path" ]; then
              echo "::error::Unit artifacts must not contain symlinks: $path"
              exit 1
            fi
            [ -f "$path" ] || continue
            relative=${path#candidate-unit/}
            case "$relative" in
              manifest.json) seen_manifest=true ;;
              "$expected") seen_candidate=true ;;
              *)
                echo "::error::Unexpected unit path: $relative"
                exit 1
                ;;
            esac
            size=$(stat --format=%s "$path")
            if (( size > 5242880 )); then
              echo "::error::Unit file exceeds 5 MiB: $relative"
              exit 1
            fi
            total=$((total + size))
          done < <(find candidate-unit -mindepth 1 -print0)
          if [ "$seen_manifest" != true ] || [ "$seen_candidate" != true ]; then
            echo "::error::Unit artifact is incomplete"
            exit 1
          fi

      - name: Reject credentials in unit data
        run: python3 scripts/scan-candidate-secrets.py candidate-unit

      - name: Verify trusted unit manifest
        env:
          UNIT_ID: ${{ matrix.unit_id }}
          UNIT_KIND: ${{ matrix.kind }}
          UNIT_SLUG: ${{ matrix.slug }}
          BASE_SHA: ${{ needs.prepare.outputs.base_sha }}
          RESEARCH_PROVIDER: ${{ needs.prepare.outputs.provider }}
          RESEARCH_MODEL: ${{ needs.prepare.outputs.model }}
          RESEARCH_PROMPT_VERSION: ${{ needs.prepare.outputs.prompt_version }}
          RUN_ID: github-actions:${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          manifest = json.loads(Path("candidate-unit/manifest.json").read_text(encoding="utf-8"))
          expected = {
              "unit_id": os.environ["UNIT_ID"],
              "kind": os.environ["UNIT_KIND"],
              "slug": os.environ["UNIT_SLUG"],
              "selected_slugs": (
                  [os.environ["UNIT_SLUG"]]
                  if os.environ["UNIT_KIND"] == "evidence" else []
              ),
              "base_sha": os.environ["BASE_SHA"],
              "provider": os.environ["RESEARCH_PROVIDER"],
              "model": os.environ["RESEARCH_MODEL"],
              "prompt_version": os.environ["RESEARCH_PROMPT_VERSION"],
              "run_id": os.environ["RUN_ID"],
              "run_url": os.environ["RUN_URL"],
          }
          for key, value in expected.items():
              if manifest.get(key) != value:
                  raise SystemExit(f"unit manifest {key} mismatch")
          path = Path("candidate-unit") / manifest["path"]
          if hashlib.sha256(path.read_bytes()).hexdigest() != manifest.get("sha256"):
              raise SystemExit("unit manifest digest mismatch")
          PY

      - name: Apply candidate unit through its fixed path
        env:
          UNIT_KIND: ${{ matrix.kind }}
          UNIT_SLUG: ${{ matrix.slug }}
        run: |
          set -euo pipefail
          if [ "$UNIT_KIND" = "evidence" ]; then
            relative="verification/evidence/${UNIT_SLUG}.yaml"
          else
            relative="experiments/NOTES.md"
          fi
          install -D -m 0644 "candidate-unit/$relative" "$relative"

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: Install validation dependencies
        run: python3 -m pip install --requirement tests/requirements.txt

      - name: Enforce exact unit scope and current-run provenance
        env:
          UNIT_KIND: ${{ matrix.kind }}
          SELECTED_SLUGS: ${{ matrix.selected_slugs_json }}
          EXPECTED_RUN_ID: github-actions:${{ github.run_id }}
          EXPECTED_CHECKED_DATE: ${{ needs.prepare.outputs.checked_date }}
          EXPECTED_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EXPECTED_PROVIDER: ${{ needs.prepare.outputs.provider }}
          EXPECTED_MODEL: ${{ needs.prepare.outputs.model }}
          EXPECTED_PROMPT_VERSION: ${{ needs.prepare.outputs.prompt_version }}
        run: |
          python3 scripts/validate-research-scope.py \
            --kind "$UNIT_KIND" \
            --selected-json "$SELECTED_SLUGS" \
            --expected-run-id "$EXPECTED_RUN_ID" \
            --expected-checked-date "$EXPECTED_CHECKED_DATE" \
            --expected-run-url "$EXPECTED_RUN_URL" \
            --expected-provider "$EXPECTED_PROVIDER" \
            --expected-model "$EXPECTED_MODEL" \
            --expected-prompt-version "$EXPECTED_PROMPT_VERSION"
          git diff --check

      - name: Prepare evidence unit for schema validation
        if: matrix.kind == 'evidence'
        env:
          SELECTED_SLUGS: ${{ matrix.selected_slugs_json }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          import yaml

          path = Path("verification/pending-evidence.yaml")
          data = yaml.safe_load(path.read_text(encoding="utf-8")) or {}
          selected = set(json.loads(os.environ["SELECTED_SLUGS"]))
          data["pending"] = [slug for slug in data.get("pending", []) if slug not in selected]
          path.write_text(yaml.safe_dump(data, sort_keys=False), encoding="utf-8")
          PY

      - name: Recheck exact unit scope and current-run provenance
        env:
          MODE: ${{ matrix.kind == 'discovery' && 'discover-only' || 'single-pattern' }}
          SELECTED_SLUGS: ${{ matrix.selected_slugs_json }}
          EXPECTED_RUN_ID: github-actions:${{ github.run_id }}
          EXPECTED_CHECKED_DATE: ${{ needs.prepare.outputs.checked_date }}
          EXPECTED_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EXPECTED_PROVIDER: ${{ needs.prepare.outputs.provider }}
          EXPECTED_MODEL: ${{ needs.prepare.outputs.model }}
          EXPECTED_PROMPT_VERSION: ${{ needs.prepare.outputs.prompt_version }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          import subprocess
          from pathlib import Path

          import yaml

          mode = os.environ["MODE"]
          selected_list = json.loads(os.environ["SELECTED_SLUGS"])
          if not isinstance(selected_list, list) or not all(
                  isinstance(slug, str) and re.fullmatch(r"[a-z0-9]+(?:-[a-z0-9]+)*", slug)
                  for slug in selected_list):
              raise SystemExit("selected_slugs must be a JSON list of canonical slugs")
          if len(selected_list) != len(set(selected_list)):
              raise SystemExit("selected_slugs contains duplicates")
          selected = set(selected_list)

          changed = set(subprocess.run(
              ["git", "diff", "--name-only"], check=True, capture_output=True, text=True,
          ).stdout.splitlines())
          changed.update(subprocess.run(
              [
                  "git", "ls-files", "--others", "--exclude-standard", "--",
                  "verification/evidence",
              ],
              check=True, capture_output=True, text=True,
          ).stdout.splitlines())
          evidence_changed = {
              match.group(1)
              for path in changed
              if (match := re.fullmatch(
                  r"verification/evidence/([a-z0-9]+(?:-[a-z0-9]+)*)\.yaml", path))
          }

          before_pending = set((yaml.safe_load(subprocess.run(
              ["git", "show", "HEAD:verification/pending-evidence.yaml"],
              check=True, capture_output=True, text=True,
          ).stdout) or {}).get("pending", []))
          after_pending = set((yaml.safe_load(Path(
              "verification/pending-evidence.yaml").read_text(encoding="utf-8")) or {}).get(
                  "pending", []))
          pending_delta = before_pending ^ after_pending

          if mode == "discover-only":
              if evidence_changed or pending_delta:
                  raise SystemExit(
                      "discover-only mode must not change evidence or pending membership")
              unexpected = changed - {"experiments/NOTES.md"}
              if unexpected:
                  raise SystemExit(
                      f"discover-only mode changed forbidden paths: {sorted(unexpected)}")
              raise SystemExit(0)

          missing = selected - evidence_changed
          extra = evidence_changed - selected
          if missing or extra:
              raise SystemExit(
                  f"evidence scope mismatch; missing={sorted(missing)}, extra={sorted(extra)}")
          if pending_delta - selected:
              raise SystemExit(
                  f"pending membership changed outside scope: {sorted(pending_delta - selected)}")
          still_pending = selected & after_pending
          if still_pending:
              raise SystemExit(
                  f"selected evidence remains pending: {sorted(still_pending)}")

          expected_date = os.environ["EXPECTED_CHECKED_DATE"]
          for slug in selected_list:
              path = Path("verification/evidence") / f"{slug}.yaml"
              data = yaml.safe_load(path.read_text(encoding="utf-8"))
              if data.get("provenance_status") != "complete":
                  raise SystemExit(f"{slug}: selected output must have complete provenance")
              if str(data.get("last_checked")) != expected_date:
                  raise SystemExit(f"{slug}: last_checked must be {expected_date}")
              search = data.get("search") or {}
              if search.get("run_id") != os.environ["EXPECTED_RUN_ID"]:
                  raise SystemExit(f"{slug}: search.run_id does not identify this run")
              if search.get("run_url") != os.environ["EXPECTED_RUN_URL"]:
                  raise SystemExit(f"{slug}: search.run_url does not identify this run")
              if search.get("provider") != os.environ["EXPECTED_PROVIDER"]:
                  raise SystemExit(f"{slug}: search.provider does not match this run")
              if search.get("model") != os.environ["EXPECTED_MODEL"]:
                  raise SystemExit(f"{slug}: search.model does not match this run")
              if search.get("prompt_version") != os.environ["EXPECTED_PROMPT_VERSION"]:
                  raise SystemExit(f"{slug}: search.prompt_version does not match this run")
              entries = data.get("evidence")
              if entries == "none found":
                  continue
              if not isinstance(entries, list):
                  raise SystemExit(f"{slug}: evidence must be a list or 'none found'")
              for index, entry in enumerate(entries):
                  verifier = entry.get("verifier") if isinstance(entry, dict) else None
                  if not isinstance(verifier, dict):
                      raise SystemExit(f"{slug}: evidence[{index}] lacks verifier metadata")
                  if verifier.get("method") != "automated":
                      raise SystemExit(
                          f"{slug}: evidence[{index}] verifier.method must be automated")
                  if verifier.get("model") != os.environ["EXPECTED_MODEL"]:
                      raise SystemExit(
                          f"{slug}: evidence[{index}] verifier.model does not match this run")
                  if verifier.get("prompt_version") != os.environ["EXPECTED_PROMPT_VERSION"]:
                      raise SystemExit(
                          f"{slug}: evidence[{index}] verifier.prompt_version does not match "
                          "this run")
          print(f"Validated exact completion of {len(selected)} selected evidence record(s)")
          PY

      - name: Recompute unit verdict
        if: matrix.kind == 'evidence'
        run: >-
          python3 scripts/validate-evidence.py
          --registry patterns.yaml
          --allowlist verification/pending-evidence.yaml

      - name: Regenerate temporary unit status
        if: matrix.kind == 'evidence'
        run: |
          python3 scripts/generate-verification-status.py
          python3 scripts/generate-verification-status.py --check

      - name: Check site artifacts
        run: |
          python3 scripts/generate-patterns-data.py --check
          python3 -m pytest tests/test_readme_accuracy.py tests/test_patterns_data.py -m "not slow" --tb=short

      - name: Upload independently validated unit
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: validated-verification-unit-${{ needs.prepare.outputs.plan_id }}-${{ matrix.unit_id }}
          path: candidate-unit/
          if-no-files-found: error
          retention-days: 7
          overwrite: true

  assemble-candidate:
    name: Assemble and validate complete candidate
    needs: [prepare, validate-candidate]
    if: >-
      !cancelled() &&
      needs.prepare.result == 'success' &&
      needs.prepare.outputs.has_units == 'true' &&
      needs.validate-candidate.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    outputs:
      has_changes: ${{ steps.diff.outputs.has_changes }}
      changed_paths: ${{ steps.diff.outputs.changed_paths }}
    steps:
      - name: Checkout trusted base revision
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.prepare.outputs.base_sha }}
          persist-credentials: false

      - name: Download deterministic research plan
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: verification-research-plan-${{ needs.prepare.outputs.plan_id }}
          path: verification/run-plan

      - name: Download every validated unit separately
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          pattern: validated-verification-unit-${{ needs.prepare.outputs.plan_id }}-*
          path: validated-units
          merge-multiple: false

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: Install validation dependencies
        run: python3 -m pip install --requirement tests/requirements.txt

      - name: Assemble exact validated unit set
        env:
          PLAN_ID: ${{ needs.prepare.outputs.plan_id }}
        run: >-
          python3 scripts/assemble-verification-units.py
          --root .
          --artifacts validated-units
          --matrix verification/run-plan/execution-matrix.json
          --plan-id "$PLAN_ID"

      - name: Synchronize evidence-derived decision signals
        if: needs.prepare.outputs.mode != 'discover-only'
        run: python3 scripts/sync-verification-decisions.py

      - name: Regenerate shared verification status
        if: needs.prepare.outputs.mode != 'discover-only'
        run: python3 scripts/generate-verification-status.py

      - name: Protect human-owned naming decisions
        run: |
          python3 - <<'PY'
          import subprocess
          from pathlib import Path

          def decision_column(text):
              decisions = {}
              in_ledger = False
              for line in text.splitlines():
                  if line == "## Naming-decision ledger":
                      in_ledger = True
                      continue
                  if in_ledger and line.startswith("## "):
                      break
                  if not in_ledger or not line.startswith("|"):
                      continue
                  cells = [cell.strip() for cell in line.split("|")]
                  if len(cells) < 7 or cells[1] == "Pattern" or set(cells[1]) <= {"-"}:
                      continue
                  decisions[cells[1]] = cells[5]
              return decisions

          before = decision_column(subprocess.run(
              ["git", "show", "HEAD:verification/DECISIONS.md"], check=True,
              capture_output=True, text=True).stdout)
          after = decision_column(Path(
              "verification/DECISIONS.md").read_text(encoding="utf-8"))
          removed = before.keys() - after.keys()
          changed = {name for name, value in before.items() if after.get(name) != value}
          unsafe_new = {name for name in after.keys() - before.keys()
                        if after[name] not in {"", "—"}}
          if removed or changed or unsafe_new:
              raise SystemExit(
                  "verification aggregation edited a human-owned Decision value: "
                  f"removed={sorted(removed)}, changed={sorted(changed)}, "
                  f"unsafe_new={sorted(unsafe_new)}")
          PY

      - name: Verify changed path allowlist
        id: diff
        run: |
          set -euo pipefail
          changed_paths=$(
            {
              git diff --name-only
              git ls-files --others --exclude-standard -- verification/evidence
            } | LC_ALL=C sort -u
          )
          while IFS= read -r path; do
            [ -n "$path" ] || continue
            case "$path" in
              experiments/NOTES.md|verification/DECISIONS.md|verification/STATUS.md|verification/pending-evidence.yaml|verification/evidence/*.yaml)
                ;;
              *)
                echo "::error::Assembled candidate changed a forbidden path: $path"
                exit 1
                ;;
            esac
          done <<< "$changed_paths"
          git diff --check
          if [ -n "$changed_paths" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            {
              echo "changed_paths<<EOF"
              echo "$changed_paths"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "changed_paths=" >> "$GITHUB_OUTPUT"
            echo "No repository changes were proposed." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Enforce complete aggregate scope and provenance
        env:
          MODE: ${{ needs.prepare.outputs.mode }}
          SELECTED_SLUGS: ${{ needs.prepare.outputs.selected_slugs }}
          EXPECTED_RUN_ID: github-actions:${{ github.run_id }}
          EXPECTED_CHECKED_DATE: ${{ needs.prepare.outputs.checked_date }}
          EXPECTED_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EXPECTED_PROVIDER: ${{ needs.prepare.outputs.provider }}
          EXPECTED_MODEL: ${{ needs.prepare.outputs.model }}
          EXPECTED_PROMPT_VERSION: ${{ needs.prepare.outputs.prompt_version }}
        run: |
          if [ "$MODE" = "discover-only" ]; then kind=discovery; else kind=evidence; fi
          python3 scripts/validate-research-scope.py \
            --kind "$kind" \
            --selected-json "$SELECTED_SLUGS" \
            --expected-run-id "$EXPECTED_RUN_ID" \
            --expected-checked-date "$EXPECTED_CHECKED_DATE" \
            --expected-run-url "$EXPECTED_RUN_URL" \
            --expected-provider "$EXPECTED_PROVIDER" \
            --expected-model "$EXPECTED_MODEL" \
            --expected-prompt-version "$EXPECTED_PROMPT_VERSION" \
            --allow-shared

      - name: Recompute aggregate verdicts
        run: >-
          python3 scripts/validate-evidence.py
          --registry patterns.yaml
          --allowlist verification/pending-evidence.yaml

      - name: Check generated status
        run: python3 scripts/generate-verification-status.py --check

      - name: Run evidence guard tests
        run: >-
          python3 -m pytest
          tests/test_evidence_files.py
          tests/test_evidence_content.py
          -m "not slow" --tb=short

      - name: Check site artifacts
        run: |
          python3 scripts/generate-patterns-data.py --check
          python3 -m pytest tests/test_readme_accuracy.py tests/test_patterns_data.py -m "not slow" --tb=short

      - name: Export final fixed-path candidate
        if: steps.diff.outputs.has_changes == 'true'
        run: |
          mkdir candidate
          python3 scripts/export-research-candidate.py . candidate

      - name: Scan final candidate
        if: steps.diff.outputs.has_changes == 'true'
        run: python3 scripts/scan-candidate-secrets.py candidate

      - name: Upload final validated candidate
        if: steps.diff.outputs.has_changes == 'true'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: validated-verification-candidate-${{ needs.prepare.outputs.plan_id }}
          path: candidate/
          if-no-files-found: error
          retention-days: 7
          overwrite: true

  publish:
    name: Publish validated candidate
    needs: [prepare, assemble-candidate]
    # Matrix validation intentionally tolerates the unused provider job being
    # skipped. Override GitHub's implicit success() here as well so that skip
    # does not propagate through the dependency chain and suppress a real diff.
    if: >-
      !cancelled() &&
      needs.prepare.result == 'success' &&
      needs.assemble-candidate.result == 'success' &&
      needs.assemble-candidate.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: write # Dispatches trusted default-branch validation for the candidate PR.
      contents: write # Pushes the validated candidate branch.
      issues: write # Reconciles evidence-gap tracking issues after publication.
      pull-requests: write # Opens the single validated draft evidence PR.
    steps:
      - name: Mint short-lived GitHub App token
        id: app-token
        if: ${{ vars.VERIFY_PATTERNS_APP_ID != '' }}
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.VERIFY_PATTERNS_APP_ID }}
          private-key: ${{ secrets.VERIFY_PATTERNS_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: Checkout trusted base revision
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.prepare.outputs.base_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Require unchanged default-branch base
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          BASE_SHA: ${{ needs.prepare.outputs.base_sha }}
        run: |
          git fetch --no-tags origin "refs/heads/${DEFAULT_BRANCH}:refs/remotes/origin/${DEFAULT_BRANCH}"
          actual=$(git rev-parse "refs/remotes/origin/${DEFAULT_BRANCH}")
          if [ "$actual" != "$BASE_SHA" ]; then
            echo "::error::Default branch advanced during research; dispatch a new run against the new base"
            exit 1
          fi

      - name: Recheck open verification PR gate
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          ALLOW_OPEN_VERIFICATION_PR: ${{ needs.prepare.outputs.allow_open_verification_pr }}
        run: |
          set -euo pipefail
          if [ "$ALLOW_OPEN_VERIFICATION_PR" = "true" ]; then exit 0; fi
          conflicts=$(
            gh api --paginate \
              "repos/${GITHUB_REPOSITORY}/pulls?state=open&per_page=100" \
              --jq ".[] | select(.head.repo.full_name == \"${GITHUB_REPOSITORY}\") | .head.ref" \
            | while IFS= read -r head_ref; do
                [[ "$head_ref" =~ ^verify/refresh-[0-9]+-[0-9]+$ ]] || continue
                [[ "$head_ref" =~ ^verify/refresh-${GITHUB_RUN_ID}-[0-9]+$ ]] && continue
                echo "$head_ref"
              done
          )
          if [ -n "$conflicts" ]; then
            echo "::error::Another verification PR appeared during research; dispatch a new run after it closes"
            echo "$conflicts"
            exit 1
          fi

      - name: Download validated candidate
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: validated-verification-candidate-${{ needs.prepare.outputs.plan_id }}
          path: candidate

      - name: Apply validated fixed-path files
        run: |
          set -euo pipefail
          for path in \
            README.md \
            index.html \
            assets/js/patterns-data.js \
            experiments/NOTES.md \
            verification/DECISIONS.md \
            verification/STATUS.md \
            verification/pending-evidence.yaml; do
            if [ -f "candidate/$path" ]; then install -m 0644 "candidate/$path" "$path"; fi
          done
          for path in candidate/verification/evidence/*.yaml; do
            [ -e "$path" ] || continue
            install -m 0644 "$path" "verification/evidence/${path##*/}"
          done
          git diff --check

      - name: Recheck evidence before publication
        run: |
          python3 -m pip install pyyaml==6.0.2
          python3 scripts/validate-evidence.py \
            --registry patterns.yaml \
            --allowlist verification/pending-evidence.yaml
          python3 scripts/generate-verification-status.py --check

      - name: Commit, push, and open pull request
        id: publish
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          PUBLISH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RESEARCH_PROVIDER: ${{ needs.prepare.outputs.provider }}
          RESEARCH_MODEL: ${{ needs.prepare.outputs.model }}
          RESEARCH_PROMPT_VERSION: ${{ needs.prepare.outputs.prompt_version }}
        run: |
          set -euo pipefail
          branch="verify/refresh-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          [[ "$branch" =~ ^verify/refresh-[0-9]+-[0-9]+$ ]]

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- \
            README.md \
            index.html \
            assets/js/patterns-data.js \
            experiments/NOTES.md \
            verification/DECISIONS.md \
            verification/STATUS.md \
            verification/pending-evidence.yaml \
            verification/evidence/
          git diff --cached --check
          candidate_tree=$(git write-tree)

          body_file="$RUNNER_TEMP/evidence-pr-body.md"
          printf '%s\n\nResearch provider: %s\nResearch model: %s\nResearch contract: %s\nSource run: %s\n' \
            'Candidate evidence collected without repository write credentials, then deterministically validated before publication.' \
            "$RESEARCH_PROVIDER" \
            "$RESEARCH_MODEL" \
            "$RESEARCH_PROMPT_VERSION" \
            "$RUN_URL" > "$body_file"

          # A failed post-publication step may be retried under a new run
          # attempt. Reuse an already-open PR only when its head tree is the
          # exact validated candidate, never merely because its name matches.
          open_pulls="$RUNNER_TEMP/open-verification-pulls.b64"
          gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/pulls?state=open&per_page=100" \
            --jq '.[] | [.number, .html_url, .head.ref, .head.sha, .head.repo.full_name, (.body // "")] | @base64' \
            > "$open_pulls"
          existing=$(
            OPEN_PULLS="$open_pulls" python3 - <<'PY'
          import base64
          import json
          import os
          import re
          from pathlib import Path

          run_id = os.environ["GITHUB_RUN_ID"]
          run_url = os.environ["RUN_URL"]
          head_re = re.compile(rf"verify/refresh-{re.escape(run_id)}-[0-9]+")
          pulls = [
              json.loads(base64.b64decode(line))
              for line in Path(os.environ["OPEN_PULLS"]).read_text(
                  encoding="utf-8").splitlines()
              if line
          ]
          matches = [
              pull for pull in pulls
              if head_re.fullmatch(pull[2])
              and pull[4] == os.environ["GITHUB_REPOSITORY"]
              and f"Source run: {run_url}" in pull[5]
          ]
          if len(matches) > 1:
              raise SystemExit("multiple open PRs identify this source run")
          if matches:
              pull = matches[0]
              print(f"{pull[2]}\t{pull[1]}\t{pull[0]}\t{pull[3]}")
          PY
          )
          if [ -n "$existing" ]; then
            IFS=$'\t' read -r branch pr_url pr_number head_sha <<< "$existing"
            head_tree=$(gh api \
              "repos/${GITHUB_REPOSITORY}/git/commits/${head_sha}" --jq .tree.sha)
            if [ "$head_tree" != "$candidate_tree" ]; then
              echo "::error::The existing source-run PR no longer matches the validated candidate"
              exit 1
            fi
            {
              echo "branch=$branch"
              echo "pr_url=$pr_url"
              echo "pr_number=$pr_number"
            } >> "$GITHUB_OUTPUT"
            echo "Reusing candidate PR from this source run: $pr_url" \
              >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Recover the smaller failure window where the prior attempt pushed
          # its exact tree but failed before creating the PR. A mismatched
          # same-run branch is never overwritten or silently superseded.
          remote_refs="$RUNNER_TEMP/source-run-refs.tsv"
          gh api \
            "repos/${GITHUB_REPOSITORY}/git/matching-refs/heads/verify/refresh-${GITHUB_RUN_ID}-" \
            --jq '.[] | [.ref, .object.sha] | @tsv' > "$remote_refs"
          matching_branch=""
          while IFS=$'\t' read -r ref head_sha; do
            [ -n "$ref" ] || continue
            candidate_branch=${ref#refs/heads/}
            [[ "$candidate_branch" =~ ^verify/refresh-${GITHUB_RUN_ID}-[0-9]+$ ]] \
              || continue
            head_tree=$(gh api \
              "repos/${GITHUB_REPOSITORY}/git/commits/${head_sha}" --jq .tree.sha)
            if [ "$head_tree" != "$candidate_tree" ]; then
              echo "::error::A same-run branch exists with a different candidate tree: $candidate_branch"
              exit 1
            fi
            if [ -n "$matching_branch" ]; then
              echo "::error::Multiple same-run branches contain the validated candidate"
              exit 1
            fi
            matching_branch=$candidate_branch
          done < "$remote_refs"

          if [ -n "$matching_branch" ]; then
            branch=$matching_branch
          else
            git switch --create "$branch"
            git commit -m "docs(verification): refresh adoption evidence"
            git push \
              "https://x-access-token:${PUBLISH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
              "HEAD:refs/heads/${branch}"
          fi

          # Query by owner + branch through REST, then require the exact
          # same-repository head. `gh pr list --head` cannot express this and
          # could otherwise select a fork PR with the predictable branch name.
          branch_pulls="$RUNNER_TEMP/branch-pulls.json"
          gh api --method GET "repos/${GITHUB_REPOSITORY}/pulls" \
            -f state=open \
            -f head="${GITHUB_REPOSITORY_OWNER}:${branch}" \
            -f per_page=100 > "$branch_pulls"
          branch_pr=$(
            BRANCH_PULLS="$branch_pulls" BRANCH="$branch" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          pulls = json.loads(Path(os.environ["BRANCH_PULLS"]).read_text(encoding="utf-8"))
          matches = [
              pull for pull in pulls
              if pull["head"]["repo"]["full_name"] == os.environ["GITHUB_REPOSITORY"]
              and pull["head"]["ref"] == os.environ["BRANCH"]
          ]
          if len(matches) > 1:
              raise SystemExit("multiple open PRs use the same repository head")
          if matches:
              pull = matches[0]
              if f'Source run: {os.environ["RUN_URL"]}' not in (pull.get("body") or ""):
                  raise SystemExit("existing branch PR does not identify this source run")
              print(f'{pull["html_url"]}\t{pull["number"]}\t{pull["head"]["sha"]}')
          PY
          )
          if [ -n "$branch_pr" ]; then
            IFS=$'\t' read -r pr_url pr_number head_sha <<< "$branch_pr"
            head_tree=$(gh api \
              "repos/${GITHUB_REPOSITORY}/git/commits/${head_sha}" --jq .tree.sha)
            if [ "$head_tree" != "$candidate_tree" ]; then
              echo "::error::Existing branch PR does not match the validated candidate tree"
              exit 1
            fi
          else
            pr_url=$(gh pr create \
              --base "$DEFAULT_BRANCH" \
              --head "$branch" \
              --draft \
              --title "docs(verification): refresh adoption evidence" \
              --body-file "$body_file")
            pr_number=$(gh pr view "$pr_url" --json number --jq .number)
          fi
          {
            echo "branch=$branch"
            echo "pr_url=$pr_url"
            echo "pr_number=$pr_number"
          } >> "$GITHUB_OUTPUT"
          {
            echo "Published candidate PR: $pr_url"
            echo "Research provider/model: $RESEARCH_PROVIDER / $RESEARCH_MODEL"
            echo "Research contract: $RESEARCH_PROMPT_VERSION"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Reconcile main-catalog evidence-gap issues
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          BASE_SHA: ${{ needs.prepare.outputs.base_sha }}
          PR_URL: ${{ steps.publish.outputs.pr_url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          gh label create needs-evidence \
            --description "Pattern lacks sufficient adoption evidence" \
            --color D93F0B \
            --force
          python3 - <<'PY'
          import json
          import os
          import re
          import subprocess
          from pathlib import Path

          import yaml

          def gh(*arguments, capture=False):
              completed = subprocess.run(
                  ["gh", *arguments],
                  check=True,
                  text=True,
                  capture_output=capture,
              )
              return completed.stdout if capture else ""

          registry = yaml.safe_load(Path("patterns.yaml").read_text(encoding="utf-8"))
          main_patterns = {item["id"]: item["name"] for item in registry["patterns"]}
          changed = subprocess.run(
              [
                  "git", "diff", "--cached", "--name-only", os.environ["BASE_SHA"], "--",
                  "verification/evidence",
              ],
              check=True,
              text=True,
              capture_output=True,
          ).stdout.splitlines()
          open_issues = json.loads(gh(
              "issue", "list", "--state", "open", "--label", "needs-evidence",
              "--limit", "200", "--json", "number,title", capture=True,
          ))
          by_title = {issue["title"]: issue for issue in open_issues}

          for relative in changed:
              match = re.fullmatch(r"verification/evidence/([a-z0-9-]+)\.yaml", relative)
              if not match or match.group(1) not in main_patterns:
                  continue
              slug = match.group(1)
              name = main_patterns[slug]
              evidence = yaml.safe_load(Path(relative).read_text(encoding="utf-8"))
              verdict = evidence.get("verdict")
              provenance = evidence.get("provenance_status")
              title = f"Adoption evidence gap: {name}"
              issue = by_title.get(title)
              links = f"Candidate PR: {os.environ['PR_URL']}\nSource run: {os.environ['RUN_URL']}"

              if verdict in {"unverified", "weak"}:
                  body = (
                      f"Deterministic validation still classifies **{name}** as `{verdict}` "
                      f"after the scheduled three-mode evidence search.\n\n{links}"
                  )
                  if issue:
                      gh("issue", "comment", str(issue["number"]), "--body", body)
                  else:
                      gh(
                          "issue", "create", "--title", title,
                          "--label", "needs-evidence", "--body", body,
                      )
              elif verdict == "verified" and provenance == "complete" and issue:
                  gh(
                      "issue", "comment", str(issue["number"]),
                      "--body", (
                          "The candidate computes to `verified`; this issue will close only "
                          f"after the evidence PR merges.\n\n{links}"
                      ),
                  )
          PY

      # Explicit default-branch dispatch guarantees the required status is
      # emitted by trusted code even when an automation-created PR event waits
      # behind GitHub's approval gate.
      - name: Dispatch trusted pull request validation
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          PR_NUMBER: ${{ steps.publish.outputs.pr_number }}
        run: >-
          gh workflow run trusted-evidence-validation.yml
          --ref "$DEFAULT_BRANCH"
          --field pr_number="$PR_NUMBER"

  notify-failure:
    name: Notify on scheduled failure
    needs:
      - prepare
      - authorize-paid-research
      - preflight-openai
      - preflight-anthropic
      - research-openai
      - research-anthropic
      - validate-candidate
      - assemble-candidate
      - publish
    if: >-
      always() && github.event_name == 'schedule' &&
      contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    permissions:
      issues: write # Creates or updates the scheduled-run failure issue.
    steps:
      - name: Create or update failure issue
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            for (const label of [
              { name: 'automation', color: '1D76DB', description: 'Repository automation' },
              {
                name: 'verify-patterns-failure', color: 'B60205',
                description: 'Scheduled pattern verification is failing'
              }
            ]) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner, repo: context.repo.repo, name: label.name
                });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  owner: context.repo.owner, repo: context.repo.repo, ...label
                });
              }
            }
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'verify-patterns-failure',
              state: 'open'
            });
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body: `Scheduled verification failed again: ${runUrl}`
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Scheduled pattern verification is failing',
              labels: ['automation', 'verify-patterns-failure'],
              body: `The scheduled evidence refresh failed.\n\nFailed run: ${runUrl}`
            });

  close-resolved-failures:
    name: Close resolved scheduled failures
    needs:
      - prepare
      - authorize-paid-research
      - preflight-openai
      - preflight-anthropic
      - research-openai
      - research-anthropic
      - validate-candidate
      - assemble-candidate
      - publish
    if: >-
      always() && github.event_name == 'schedule' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    permissions:
      issues: write # Closes the scheduled-run failure issue after recovery.
    steps:
      - name: Close recovered failure issues
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'verify-patterns-failure',
              state: 'open'
            });
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            for (const issue of issues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Scheduled verification recovered: ${runUrl}`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed'
              });
            }
