name: Pattern Verification & Discovery

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        type: choice
        options:
          - stale-default   # Phases 1-3 on the 10 stalest patterns
          - full            # all phases, all patterns
          - discover-only   # Phase 4 only
          - single-pattern  # Phases 2-3 for one pattern (set 'pattern')
        default: stale-default
      pattern:
        description: "Pattern name (single-pattern mode only)"
        type: string
        required: false
      stale_days:
        description: "Staleness threshold in days"
        type: string
        default: "90"
      since_days:
        description: "Discovery lookback window in days"
        type: string
        default: "30"
      max_turns:
        description: "Max agent turns (cost ceiling)"
        type: string
        default: "120"
  schedule:
    # Weekly, an hour before pattern-validation's Monday 06:00 UTC link check,
    # so evidence PRs exist by the time that run fires. Scheduled runs use
    # stale-default mode — the cheapest, most targeted slice.
    - cron: '0 5 * * 1'
    # Monthly unknown-unknowns discovery (Phase 4) — without this cron the
    # discovery phase would only ever run on manual dispatch.
    - cron: '0 6 1 * *'

# One run at a time: parallel runs would race on verify/* branches and the
# derived inventory file.
concurrency:
  group: verify-patterns
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      # Fail fast (scheduled) or warn loudly (manual) when the PAT is missing,
      # instead of silently opening PRs that no CI will ever check.
      - name: Check PAT configuration
        env:
          HAS_PAT: ${{ secrets.VERIFY_PATTERNS_PAT != '' }}
        run: |
          if [ "$HAS_PAT" = "true" ]; then
            echo "VERIFY_PATTERNS_PAT configured — PRs opened by this run will trigger CI checks."
            exit 0
          fi
          msg="VERIFY_PATTERNS_PAT is not configured. PRs opened with the fallback GITHUB_TOKEN do NOT trigger pattern-validation or claude-code-review — each PR would need a manual close/reopen to get checks. Remediation: add a fine-grained PAT (contents, pull-requests, issues: write) as the VERIFY_PATTERNS_PAT repo secret."
          echo "::warning title=No PAT configured::$msg"
          {
            echo "## :warning: No PAT configured"
            echo
            echo "$msg"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "::error title=PAT required for scheduled runs::Unattended runs would silently produce unchecked PRs. Failing until VERIFY_PATTERNS_PAT is added."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # With VERIFY_PATTERNS_PAT configured, PRs opened by this run trigger
          # pattern-validation and claude-code-review. Without it, the fallback
          # GITHUB_TOKEN still opens PRs, but GitHub suppresses workflow runs on
          # them — checks must be triggered manually (close/reopen the PR).
          token: ${{ secrets.VERIFY_PATTERNS_PAT || github.token }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install validation dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r tests/requirements.txt

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # The pattern input reaches the agent prompt verbatim, so validate it
      # deterministically first: it must be an exact name from patterns.yaml.
      - name: Validate pattern input
        if: inputs.mode == 'single-pattern'
        env:
          PATTERN: ${{ inputs.pattern }}
        run: |
          python3 - <<'PY'
          import os, sys, yaml
          pattern = os.environ.get("PATTERN") or ""
          if any(ch in pattern for ch in "\"'\n\r"):
              sys.exit("pattern input must not contain quotes or newlines")
          names = {p["name"] for p in yaml.safe_load(open("patterns.yaml"))["patterns"]}
          if pattern not in names:
              sys.exit(f"unknown pattern name: {pattern!r} (must match patterns.yaml exactly)")
          PY

      - name: Build command arguments
        id: args
        env:
          MODE: ${{ inputs.mode || 'stale-default' }}
          # Which cron fired (empty on workflow_dispatch): the monthly
          # '0 6 1 * *' entry runs discovery instead of stale-default.
          SCHEDULE: ${{ github.event.schedule }}
          PATTERN: ${{ inputs.pattern }}
          STALE_DAYS: ${{ inputs.stale_days || '90' }}
          SINCE_DAYS: ${{ inputs.since_days || '30' }}
          MAX_TURNS: ${{ inputs.max_turns }}
        run: |
          if [ "$SCHEDULE" = "0 6 1 * *" ]; then MODE="discover-only"; fi
          case "$MODE" in
            full)           args="--full" ;;
            discover-only)  args="--discover-only" ;;
            single-pattern) args="--pattern \"$PATTERN\"" ;;
            *)              args="" ;;
          esac
          args="$args --stale-days $STALE_DAYS --since $SINCE_DAYS"
          echo "value=$args" >> "$GITHUB_OUTPUT"
          # Turn ceilings scale with mode; an explicit max_turns input wins.
          case "$MODE" in
            full) default_turns=300 ;;
            discover-only) default_turns=150 ;;
            *) default_turns=120 ;;
          esac
          echo "turns=${MAX_TURNS:-$default_turns}" >> "$GITHUB_OUTPUT"

      - name: Run pattern verification pipeline
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          # gh CLI auth inside the pipeline (branch pushes, PR/issue creation)
          GH_TOKEN: ${{ secrets.VERIFY_PATTERNS_PAT || github.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: /verify-patterns ${{ steps.args.outputs.value }}
          claude_args: |
            --model claude-sonnet-5
            --max-turns ${{ steps.args.outputs.turns }}
            --allowedTools "Bash(git:*),Bash(gh:*),Bash(python3:*),Bash(pytest:*),Bash(mkdir:*),Bash(date:*),Read,Write,Edit,Glob,Grep,WebSearch,WebFetch,Task"

      # The agent writes its own report to the step summary when it finishes
      # cleanly. These two steps run regardless — a timeout or max-turns cutoff
      # still leaves an inspectable record.
      - name: Upload agent execution log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: verify-patterns-execution-log
          path: ${{ steps.claude.outputs.execution_file }}
          if-no-files-found: ignore

      - name: Publish run summary
        if: always()
        env:
          GH_TOKEN: ${{ secrets.VERIFY_PATTERNS_PAT || github.token }}
          MODE: ${{ inputs.mode || 'stale-default' }}
          ARGS: ${{ steps.args.outputs.value }}
          AGENT_OUTCOME: ${{ steps.claude.outcome }}
        run: |
          {
            echo "## Pattern verification run"
            echo
            echo "| | |"
            echo "|---|---|"
            echo "| Mode | \`$MODE\` |"
            echo "| Args | \`/verify-patterns $ARGS\` |"
            echo "| Agent step outcome | **$AGENT_OUTCOME** |"
            echo "| Trigger | ${{ github.event_name }} |"
            echo

            echo "### Open verify/discover PRs (this run + any awaiting review)"
            prs=$(gh pr list --state open --json number,title,headRefName,url \
              --jq '.[] | select(.headRefName | test("^(verify|discover)/")) | "- [#\(.number)](\(.url)) \(.title) — `\(.headRefName)`"' || true)
            if [ -n "$prs" ]; then echo "$prs"; else echo "_none_"; fi
            echo

            echo "### Open evidence-gap issues"
            issues=$(gh issue list --label needs-evidence --state open --json number,title,url \
              --jq '.[] | "- [#\(.number)](\(.url)) \(.title)"' || true)
            if [ -n "$issues" ]; then echo "$issues"; else echo "_none_"; fi
            echo

            # One fetch of open PR heads feeds both sections below; on gh
            # failure, say so instead of false-reporting everything.
            if open_heads=$(gh pr list --state open --json headRefName --jq '.[].headRefName'); then
              heads_ok=1
            else
              heads_ok=""
            fi

            # A max-turns/timeout cutoff kills the agent's own truncation report,
            # so reconstruct coverage deterministically: the agent writes its
            # selected slugs to .verify-worklist at Phase 1. Match by branch
            # prefix, not today's date — the PR may have opened before midnight.
            echo "### Selected patterns without an opened PR (possible truncation)"
            if [ ! -f .verify-worklist ]; then
              echo "_no worklist file written (run may have died before Phase 1 completed)_"
            elif [ -z "$heads_ok" ]; then
              echo "_could not list open PRs (gh failed); skipping coverage diff_"
            else
              missing=""
              while IFS= read -r slug; do
                [ -z "$slug" ] && continue
                echo "$open_heads" | grep -q "^verify/${slug}-" \
                  || missing="$missing- \`$slug\`\n"
              done < .verify-worklist
              if [ -n "$missing" ]; then printf "%b" "$missing"; else echo "_none — all selected patterns produced PRs or needed no change_"; fi
            fi
            echo

            # Orphan branches: pushed by a cut-off run, no PR ever opened.
            echo "### verify/discover branches with no open PR"
            if [ -z "$heads_ok" ]; then
              echo "_could not list open PRs (gh failed); skipping orphan check_"
            else
              orphans=$(git ls-remote --heads origin 'verify/*' 'discover/*' | awk '{print $2}' | sed 's#refs/heads/##' \
                | while IFS= read -r branch; do echo "$open_heads" | grep -qx "$branch" || echo "- \`$branch\`"; done)
              if [ -n "$orphans" ]; then echo "$orphans"; else echo "_none_"; fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # Scheduled runs must not fail silently week after week (e.g. missing PAT,
  # repeated agent errors). Mirror pattern-validation's issue-based alerting,
  # but scoped to schedule events, which its push-scoped job never covers.
  notify-failure:
    runs-on: ubuntu-latest
    name: Notify on Scheduled Failure
    needs: [verify]
    if: failure() && github.event_name == 'schedule'
    permissions:
      issues: write
    steps:
      - name: Create or update failure issue
        uses: actions/github-script@v8
        with:
          script: |
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'verify-patterns-failure',
              state: 'open'
            });
            const runUrl = `${context.payload.repository.html_url}/actions/runs/${context.runId}`;
            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body: `Scheduled verification failed again: ${runUrl}`
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Scheduled pattern verification is failing',
              labels: ['automation', 'verify-patterns-failure'],
              body: [
                'The weekly/monthly verify-patterns run is failing, so adoption',
                'evidence is not being refreshed. Common cause: VERIFY_PATTERNS_PAT',
                'missing or expired (scheduled runs hard-fail without it).',
                '',
                `Failed run: ${runUrl}`
              ].join('\n')
            });
