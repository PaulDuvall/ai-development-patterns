name: Adoption Evidence

on:
  workflow_dispatch:
    inputs:
      check_links:
        description: Also re-fetch every evidence URL
        required: false
        type: boolean
        default: false
  workflow_call:
  push:
    branches: [main]
    paths:
      - README.md
      - index.html
      - assets/js/patterns-data.js
      - patterns.yaml
      - experiments/README.md
      - experiments/NOTES.md
      - verification/**
      - scripts/validate-evidence.py
      - scripts/generate-verification-status.py
      - scripts/build-verification-inventory.py
      - scripts/activate-verification-unit.py
      - scripts/assemble-verification-units.py
      - scripts/evidence_content.py
      - scripts/export-verification-unit.py
      - scripts/hydrate-evidence-content.py
      - scripts/scan-candidate-secrets.py
      - scripts/check-claude-execution.py
      - scripts/check-provider-preflight.py
      - scripts/check-research-workspace.py
      - scripts/sync-verification-decisions.py
      - scripts/validate-research-scope.py
      - tests/test_evidence_files.py
      - tests/test_evidence_content.py
      - tests/test_verification_inventory.py
      - tests/test_verification_status.py
      - tests/test_candidate_secret_scan.py
      - tests/test_provider_preflight.py
      - tests/test_repository_rules.py
      - tests/test_verification_workflows.py
      - tests/test_verification_units.py
      - tests/test_research_workspace_permissions.py
      - tests/requirements.txt
      - .github/codex/evidence-research.toml
      - .github/workflows/evidence-validation.yml
      - .github/workflows/trusted-evidence-validation.yml
      - .github/workflows/verify-patterns.yml
  pull_request:
    branches: [main]
  schedule:
    # Recompute every verdict weekly even when the repository is unchanged.
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: evidence-validation-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deterministic-evidence:
    name: Deterministic evidence checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: Install validation dependencies
        run: python3 -m pip install --requirement tests/requirements.txt

      - name: Recompute adoption verdicts
        run: >-
          python3 scripts/validate-evidence.py
          --registry patterns.yaml
          --allowlist verification/pending-evidence.yaml

      - name: Enforce 90-day freshness on the weekly run
        if: github.event_name == 'schedule'
        run: >-
          python3 scripts/validate-evidence.py
          --registry patterns.yaml
          --allowlist verification/pending-evidence.yaml
          --max-age-days 90

      - name: Check generated status
        run: python3 scripts/generate-verification-status.py --check

      - name: Run fast evidence tests
        run: >-
          python3 -m pytest
          tests/test_evidence_files.py
          tests/test_evidence_content.py
          tests/test_verification_inventory.py
          tests/test_verification_status.py
          tests/test_candidate_secret_scan.py
          tests/test_repository_rules.py
          tests/test_research_workspace_permissions.py
          tests/test_verification_workflows.py
          tests/test_verification_units.py
          -m "not slow" --tb=short

  codex-permission-profile:
    name: Codex permission profile smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Node.js 24
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Build read-only research Python environment
        run: |
          set -euo pipefail
          sudo "$(command -v python3)" -m venv /opt/evidence-python
          sudo /opt/evidence-python/bin/python -m pip install \
            --requirement tests/requirements.txt
          sudo chown -hR root:root /opt/evidence-python
          sudo chmod -R a=rX /opt/evidence-python

      - name: Compile and launch the pinned Codex sandbox without credentials
        env:
          CODEX_HOME: ${{ runner.temp }}/codex-profile-preflight
        run: | # zizmor: ignore[adhoc-packages] pinned to workflow CLI version
          set -euo pipefail
          npm install --global "@openai/codex@0.144.1"
          profile_user=codex-profile-agent
          profile_home=/home/$profile_user/.codex
          profile_workspace=/home/$profile_user/workspace
          sudo adduser \
            --system --home "/home/$profile_user" --shell /bin/bash \
            --group "$profile_user"
          sudo install -d -o "$profile_user" -g "$profile_user" -m 0750 \
            "$profile_workspace"
          sudo install -d -o root -g root -m 0755 \
            "$profile_home" "$profile_home/tmp"
          sudo install -d -o "$profile_user" -g "$profile_user" -m 0700 \
            "$profile_home/tmp/arg0"
          sudo install -o "$profile_user" -g "$profile_user" -m 0644 \
            /dev/null "$profile_home/installation_id"
          sudo install -o root -g root -m 0644 \
            .github/codex/evidence-research.toml "$profile_home/config.toml"
          sudo chown root:root "/home/$profile_user"
          sudo chmod 0755 "/home/$profile_user"
          codex_bin=$(command -v codex)
          node_dir=$(dirname "$(command -v node)")
          profile_env=(
            HOME="/home/$profile_user"
            CODEX_HOME="$profile_home"
            PATH="$node_dir:/usr/bin:/bin"
          )
          sudo -u "$profile_user" env -i "${profile_env[@]}" \
            timeout 30s "$codex_bin" mcp-server --strict-config </dev/null
          sudo -u "$profile_user" test -s "$profile_home/installation_id"
          missing_thread=00000000-0000-4000-8000-000000000001
          set +e
          startup_output=$(
            sudo -u "$profile_user" env -i "${profile_env[@]}" \
              timeout 30s "$codex_bin" exec \
                --skip-git-repo-check --cd "$profile_workspace" \
                --ephemeral --strict-config \
                --config 'default_permissions="evidence-research"' \
                resume "$missing_thread" 'startup smoke' 2>&1
          )
          startup_status=$?
          set -e
          printf '%s\n' "$startup_output"
          expected="no rollout found for thread id $missing_thread"
          if [ "$startup_status" -eq 124 ]; then
            echo "::error::Codex startup smoke timed out"
            exit 1
          fi
          if [ "$startup_status" -eq 0 ] || \
              ! grep -Fq "$expected" <<<"$startup_output"; then
            echo "::error::Codex did not reach initialized thread/resume handling"
            exit 1
          fi
          if grep -Eq \
              'could not create PATH aliases|failed to initialize in-process app-server client' \
              <<<"$startup_output"; then
            echo "::error::Codex CODEX_HOME startup initialization failed"
            exit 1
          fi

          install -d -m 0700 "$CODEX_HOME"
          install -m 0600 .github/codex/evidence-research.toml "$CODEX_HOME/config.toml"
          current_userns=$(sysctl -n kernel.unprivileged_userns_clone 2>/dev/null || true)
          if [ -n "$current_userns" ] && [ "$current_userns" != "1" ]; then
            sudo sysctl -w kernel.unprivileged_userns_clone=1
          fi
          current_apparmor=$(
            sysctl -n kernel.apparmor_restrict_unprivileged_userns 2>/dev/null || true
          )
          if [ -n "$current_apparmor" ] && [ "$current_apparmor" != "0" ]; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi
          timeout 30s codex sandbox \
            --permission-profile evidence-research \
            --cd "$GITHUB_WORKSPACE" \
            -- python3 -c \
              'import bs4, requests, sys, yaml; assert sys.version_info >= (3, 11)'
          if timeout 30s codex sandbox \
              --permission-profile evidence-research \
              --cd "$GITHUB_WORKSPACE" \
              -- /usr/bin/touch "$CODEX_HOME/sandbox-write-probe"; then
            rm -f "$CODEX_HOME/sandbox-write-probe"
            echo "::error::Sandbox wrote outside the workspace"
            exit 1
          fi

  evidence-links:
    name: Evidence URL recheck
    needs: deterministic-evidence
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.check_links)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: Install validation dependencies
        run: python3 -m pip install --requirement tests/requirements.txt

      - name: Re-fetch evidence URLs
        run: >-
          python3 -m pytest
          tests/test_evidence_files.py
          tests/test_evidence_content.py
          -m slow --tb=short

  reconcile-evidence-gaps:
    name: Reconcile merged evidence gaps
    needs: deterministic-evidence
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write # Closes evidence-gap issues resolved on the validated default branch.
    steps:
      - name: Checkout validated main revision
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install YAML dependency
        run: python3 -m pip install pyyaml==6.0.2

      - name: Close gaps resolved on the default branch
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          import yaml

          registry = yaml.safe_load(Path("patterns.yaml").read_text(encoding="utf-8"))
          main_patterns = {item["id"]: item["name"] for item in registry["patterns"]}
          completed = set()
          for slug, name in main_patterns.items():
              path = Path("verification/evidence") / f"{slug}.yaml"
              if not path.is_file():
                  continue
              evidence = yaml.safe_load(path.read_text(encoding="utf-8"))
              if evidence.get("provenance_status") == "complete" \
                      and evidence.get("verdict") == "verified":
                  completed.add(f"Adoption evidence gap: {name}")

          issues = json.loads(subprocess.run(
              [
                  "gh", "issue", "list", "--state", "open", "--label", "needs-evidence",
                  "--limit", "200", "--json", "number,title",
              ],
              check=True, capture_output=True, text=True,
          ).stdout)
          for issue in issues:
              if issue["title"] not in completed:
                  continue
              subprocess.run(
                  [
                      "gh", "issue", "close", str(issue["number"]),
                      "--reason", "completed", "--comment",
                      "Merged evidence now deterministically computes to `verified`.\n\n"
                      f"Validation run: {os.environ['RUN_URL']}",
                  ],
                  check=True,
              )
          PY

  notify-failure:
    name: Notify on scheduled evidence failure
    needs: [deterministic-evidence, evidence-links]
    if: >-
      always() && github.event_name == 'schedule' &&
      contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    permissions:
      issues: write # Creates or updates the scheduled validation failure issue.
    steps:
      - name: Create or update failure issue
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const label = 'evidence-validation-failure';
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner, repo: context.repo.repo, name: label
              });
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.issues.createLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                name: label, color: 'B60205',
                description: 'Scheduled evidence validation is failing'
              });
            }
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: label, state: 'open'
            });
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            if (existing.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing[0].number,
                body: `Scheduled evidence validation failed again: ${runUrl}`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: 'Scheduled adoption evidence validation is failing',
                labels: [label],
                body: `Freshness, source integrity, or deterministic validation failed.\n\n${runUrl}`
              });
            }

  close-resolved-failures:
    name: Close resolved evidence failures
    needs: [deterministic-evidence, evidence-links]
    if: >-
      always() && github.event_name == 'schedule' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    permissions:
      issues: write # Closes the scheduled validation failure issue after recovery.
    steps:
      - name: Close recovered failure issues
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: 'evidence-validation-failure', state: 'open'
            });
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            for (const issue of issues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number,
                body: `Scheduled evidence validation recovered: ${runUrl}`
              });
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, state: 'closed', state_reason: 'completed'
              });
            }
