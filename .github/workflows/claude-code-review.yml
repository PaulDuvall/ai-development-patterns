name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

permissions: {}

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    name: Review pull request
    # Optional AI review must be explicitly enabled. Deterministic PR checks
    # remain active regardless of provider configuration.
    if: vars.ENABLE_ANTHROPIC_REVIEW == 'true'
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'
    
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # Supplies candidate metadata to the optional reviewer.
      issues: read # Supplies the action's review-comment context.
      id-token: write # Exchanges the Anthropic GitHub App's short-lived token.
    
    steps:
      - name: Detect optional Anthropic credential
        id: anthropic-credential
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_REVIEW_API_KEY }}
        run: |
          configured=false
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            configured=true
          else
            echo "Claude review skipped: CLAUDE_REVIEW_API_KEY is not configured." \
              >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "configured=$configured" >> "$GITHUB_OUTPUT"

      # Anthropic's App token exchange intentionally rejects a workflow that
      # differs from the default-branch copy. Skip that one impossible
      # self-review case while leaving all deterministic PR checks active.
      - name: Detect review-workflow self change
        id: self-change
        if: steps.anthropic-credential.outputs.configured == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          files=$(gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files?per_page=100" \
            --jq '.[].filename')
          changed=false
          if grep -Fxq '.github/workflows/claude-code-review.yml' <<< "$files"; then
            changed=true
            echo "Claude review skipped: this PR changes its own trusted workflow." \
              >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        if: >-
          steps.anthropic-credential.outputs.configured == 'true' &&
          steps.self-change.outputs.changed != 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run Claude Code Review
        if: >-
          steps.anthropic-credential.outputs.configured == 'true' &&
          steps.self-change.outputs.changed != 'true'
        id: claude-review
        uses: anthropics/claude-code-action@28f83620103c48a57093dcc2837eec89e036bb9f # beta
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_REVIEW_API_KEY }}
          allowed_bots: "dependabot[bot]"

          # Optional: Specify model (defaults to Claude Sonnet 4, uncomment for Claude Opus 4)
          # model: "claude-opus-4-20250514"

          # Direct prompt for automated review (no @claude mention needed)
          direct_prompt: |
            Please review this pull request and provide feedback on:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage
            
            Be constructive and helpful in your feedback.
          
          # Optional: Customize review based on file types
          # direct_prompt: |
          #   Review this PR focusing on:
          #   - For TypeScript files: Type safety and proper interface usage
          #   - For API endpoints: Security, input validation, and error handling
          #   - For React components: Performance, accessibility, and best practices
          #   - For tests: Coverage, edge cases, and test quality
          
          # Optional: Different prompts for different authors
          # direct_prompt: |
          #   ${{ github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR' && 
          #   'Welcome! Please review this PR from a first-time contributor. Be encouraging and provide detailed explanations for any suggestions.' ||
          #   'Please provide a thorough code review focusing on our coding standards and best practices.' }}
          
          # Optional: Add specific tools for running tests or linting
          # allowed_tools: "Bash(npm run test),Bash(npm run lint),Bash(npm run typecheck)"
          
          # Optional: Skip review for certain conditions
          # if: |
          #   !contains(github.event.pull_request.title, '[skip-review]') &&
          #   !contains(github.event.pull_request.title, '[WIP]')
