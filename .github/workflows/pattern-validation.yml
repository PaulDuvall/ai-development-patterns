name: AI Development Patterns Validation

on:
  push:
    branches: [main]
    paths:
      - README.md
      - index.html
      - pattern-spec.md
      - patterns.yaml
      - assets/**
      - examples/**
      - experiments/**
      - scripts/**
      - tests/**
      - pyproject.toml
      - pytest.ini
      - .python-version
      - .github/workflows/pattern-validation.yml
      - .github/workflows/deploy-pages.yml
  # Do not add a PR path filter: Validation gate is a required check and must
  # be created for every pull request targeting main.
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, edited]
  workflow_dispatch:
    inputs:
      check_external_links:
        description: Also check external README links
        required: false
        type: boolean
        default: false
  schedule:
    # Network-backed checks run weekly rather than on every change.
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: pattern-validation-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deterministic-validation:
    name: Deterministic validation suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: Set up Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            examples/centralized-rules/gateway-strategy/ai-dev-cli/package-lock.json
            examples/centralized-rules/gateway-strategy/ai-gateway/package-lock.json
            examples/centralized-rules/gateway-strategy/org-ai-client/package-lock.json

      - name: Install validation dependencies
        run: python3 -m pip install --requirement tests/requirements.txt

      - name: Validate canonical two-word pattern names
        run: python3 scripts/validate-pattern-names.py

      - name: Check generated pattern count
        run: |
          set -euo pipefail
          python3 scripts/update-pattern-count.py
          if ! git diff --exit-code -- README.md index.html; then
            echo "::error::Pattern counts are stale. Run scripts/update-pattern-count.py and commit the results."
            exit 1
          fi

      - name: Check generated site data
        run: >-
          python3 scripts/generate-patterns-data.py --check

      - name: Install and build locked npm examples
        run: |
          set -euo pipefail
          for directory in \
            examples/centralized-rules/gateway-strategy/ai-dev-cli \
            examples/centralized-rules/gateway-strategy/ai-gateway \
            examples/centralized-rules/gateway-strategy/org-ai-client
          do
            echo "::group::Build ${directory}"
            pushd "$directory"
            npm ci --ignore-scripts --no-audit --no-fund
            npm run build
            npm run test --if-present
            popd
            echo "::endgroup::"
          done

      - name: Run deterministic repository test suites
        id: tests
        continue-on-error: true
        run: |
          set -uo pipefail
          mkdir -p tests/test-results
          set +e
          (
            cd examples/spec-driven-development
            python3 -m pytest -v --tb=short \
              --junitxml="$GITHUB_WORKSPACE/tests/test-results/spec-driven-junit.xml" \
              --json-report \
              --json-report-file="$GITHUB_WORKSPACE/tests/test-results/spec-driven-report.json"
          )
          spec_status=$?
          python3 -m pytest -m "not slow" -v --tb=short \
            --junitxml=tests/test-results/junit.xml \
            --html=tests/test-results/report.html --self-contained-html \
            --cov=tests/utils --cov-report=html:tests/test-results/coverage \
            --json-report --json-report-file=tests/test-results/report.json
          repository_status=$?
          {
            echo "spec_status=$spec_status"
            echo "repository_status=$repository_status"
          } >> "$GITHUB_OUTPUT"
          set -e
          if [ "$spec_status" -ne 0 ] || [ "$repository_status" -ne 0 ]; then
            exit 1
          fi

      - name: Generate local-agent fix prompt
        if: steps.tests.outcome == 'failure'
        env:
          SPEC_STATUS: ${{ steps.tests.outputs.spec_status }}
          REPOSITORY_STATUS: ${{ steps.tests.outputs.repository_status }}
        run: |
          {
            echo "## Local agent fix instructions"
            echo
            echo "Use this prompt in a signed-in local coding-agent session:"
            echo
            echo '````'
            if [ "$SPEC_STATUS" != "0" ]; then
              echo "The embedded Spec-Driven Development gate failed. Reproduce it with:"
              echo "  cd examples/spec-driven-development && python3 -m pytest -v --tb=short"
              if [ -f tests/test-results/spec-driven-report.json ]; then
                python3 scripts/generate-audit-prompt.py \
                  --rerun-command \
                  'cd examples/spec-driven-development && python3 -m pytest -x -q' \
                  tests/test-results/spec-driven-report.json 2>/dev/null || true
              else
                echo 'The embedded suite failed before spec-driven-report.json was written.'
              fi
            fi
            if [ "$REPOSITORY_STATUS" != "0" ] && \
                [ -f tests/test-results/report.json ]; then
              python3 scripts/generate-audit-prompt.py \
                tests/test-results/report.json 2>/dev/null || true
            elif [ "$REPOSITORY_STATUS" != "0" ]; then
              echo 'The repository suite failed before report.json was written.'
              echo 'Run: python3 -m pytest -m "not slow" -x -q'
            fi
            echo '````'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload deterministic test reports
        if: always() && steps.tests.outcome != 'skipped'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deterministic-validation-report
          path: tests/test-results/
          if-no-files-found: error
          retention-days: 14

      - name: Fail when repository tests fail
        if: steps.tests.outcome == 'failure'
        run: exit 1

  validation-gate:
    name: Validation gate
    needs: [deterministic-validation]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Require every deterministic component
        env:
          DETERMINISTIC_VALIDATION_RESULT: ${{ needs.deterministic-validation.result }}
        run: |
          set -euo pipefail
          if [ "$DETERMINISTIC_VALIDATION_RESULT" != "success" ]; then
            echo "::error::Deterministic validation finished with: $DETERMINISTIC_VALIDATION_RESULT"
            exit 1
          fi
          echo "All required deterministic validation components passed."

  external-links:
    name: Weekly external link recheck
    needs: [deterministic-validation]
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.check_external_links)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: Install validation dependencies
        run: python3 -m pip install --requirement tests/requirements.txt

      - name: Check external README links
        continue-on-error: true
        run: python3 -m pytest tests/test_links.py -m slow -v --tb=short

  notify-failure:
    name: Notify on failure
    needs: [deterministic-validation, validation-gate]
    if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create issue on failure (skip if duplicate)
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const label = 'pattern-validation';
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: label,
              state: 'open'
            });
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const remediation = [
              '### Remediation checklist',
              '',
              '- [ ] Open the failed run and identify the first deterministic failure.',
              '- [ ] Reproduce the repository suite with `python3 -m pytest -m "not slow" -x -q`.',
              '- [ ] Reproduce the embedded gate with `cd examples/spec-driven-development && python3 -m pytest -x -q`.',
              '- [ ] For catalog changes, run `python3 scripts/validate-pattern-names.py` and `python3 scripts/generate-patterns-data.py --check`.',
              '- [ ] Use the `Local agent fix instructions` in the job summary from a signed-in local coding-agent session if useful.',
              '- [ ] Commit the correction and confirm the required `Validation gate` check passes.'
            ].join('\n');
            if (existing.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body: `Still failing on commit ${context.sha}.\n\n${runUrl}\n\n${remediation}`
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Pattern Validation Failed - ${new Date().toISOString().split('T')[0]}`,
              labels: ['bug', 'automation', label],
              body: `Deterministic validation failed on commit ${context.sha}.\n\n${runUrl}\n\n${remediation}`
            });

  close-resolved-issues:
    name: Close resolved issues
    needs: [validation-gate]
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Close pattern-validation issues
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'pattern-validation',
              state: 'open'
            });
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            for (const issue of issues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `All deterministic pattern validation passed on commit ${context.sha}.\n\n${runUrl}`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed'
              });
            }
