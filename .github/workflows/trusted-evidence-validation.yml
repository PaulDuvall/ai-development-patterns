name: Trusted Adoption Evidence

on:
  pull_request_target: # zizmor: ignore[dangerous-triggers] candidate data is never executed
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, edited]
  issue_comment:
    types: [created, edited, deleted]

# The base-branch workflow and scripts are the trust root. Candidate code is
# checked out as inert data and is never imported or executed.
permissions: {}

concurrency:
  group: trusted-evidence-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  trusted-evidence:
    name: Trusted validator execution
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: read
      pull-requests: read
      statuses: write
    steps:
      - name: Resolve immutable pull request revisions
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          EVENT_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          EVENT_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          [[ "$EVENT_PR_NUMBER" =~ ^[1-9][0-9]*$ ]]
          [[ "$EVENT_HEAD_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$EVENT_BASE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$EVENT_HEAD_REPO" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]
          pull=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${EVENT_PR_NUMBER}")
          state=$(jq -r .state <<< "$pull")
          current_head_sha=$(jq -r .head.sha <<< "$pull")
          current_head_repo=$(jq -r .head.repo.full_name <<< "$pull")
          current_base_sha=$(jq -r .base.sha <<< "$pull")
          current_base_ref=$(jq -r .base.ref <<< "$pull")
          eligible=false
          if [ "$state" = open ] &&
             [ "$EVENT_BASE_REF" = main ] &&
             [ "$current_head_sha" = "$EVENT_HEAD_SHA" ] &&
             [ "$current_head_repo" = "$EVENT_HEAD_REPO" ] &&
             [ "$current_base_sha" = "$EVENT_BASE_SHA" ] &&
             [ "$current_base_ref" = "$EVENT_BASE_REF" ]; then
            eligible=true
          else
            echo "::notice::PR event no longer matches the current open main-targeting pull request; trusted validation is a successful no-op."
          fi
          trust_root_approved=false
          if [ "$eligible" = true ]; then
            expected="APPROVE TRUST ROOT ${EVENT_HEAD_SHA}"
            comments=$(gh api --paginate --slurp \
              "repos/${GITHUB_REPOSITORY}/issues/${EVENT_PR_NUMBER}/comments?per_page=100")
            if jq -e --arg expected "$expected" \
              'any(.[][]; .body == $expected and .author_association == "OWNER")' \
              <<< "$comments" > /dev/null; then
              trust_root_approved=true
            else
              echo "::notice::Protected trust-root changes require an OWNER comment containing exactly: ${expected}"
            fi
          fi
          {
            echo "eligible=$eligible"
            echo "trust_root_approved=$trust_root_approved"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout trusted base
        id: checkout-base
        if: steps.resolve.outputs.eligible == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: trusted
          persist-credentials: false

      - name: Checkout candidate as inert data
        id: checkout-candidate
        if: steps.resolve.outputs.eligible == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: candidate
          persist-credentials: false
          # This is the sole v7 fork opt-in. Candidate files remain inert data:
          # no candidate script, action, or executable is ever invoked below.
          allow-unsafe-pr-checkout: true

      - name: Reject unsafe candidate filesystem entries
        id: filesystem
        if: steps.resolve.outputs.eligible == 'true'
        run: |
          set -euo pipefail
          if find candidate -type l -print -quit | grep -q .; then
            echo "::error::Candidate checkout must not contain symbolic links"
            exit 1
          fi
          while IFS= read -r -d '' path; do
            size=$(stat --format=%s "$path")
            if (( size > 5242880 )); then
              echo "::error::Candidate file exceeds 5 MiB: $path"
              exit 1
            fi
          done < <(find candidate/verification candidate/patterns.yaml candidate/experiments/README.md \
            -type f -print0)

      - name: Set up Python 3.11
        id: setup-python
        if: steps.resolve.outputs.eligible == 'true'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            trusted/.github/requirements.txt
            trusted/tests/requirements.txt

      - name: Install minimal trusted workflow-policy dependency
        id: install-policy
        if: steps.resolve.outputs.eligible == 'true'
        run: >-
          python3 -m pip install --requirement
          trusted/.github/requirements.txt

      - name: Enforce candidate workflow policy with trusted code
        id: workflow-policy
        if: steps.resolve.outputs.eligible == 'true'
        env:
          TRUST_ROOT_APPROVED: ${{ steps.resolve.outputs.trust_root_approved }}
        run: |
          set -euo pipefail
          upgrade_args=()
          if [ "$TRUST_ROOT_APPROVED" = true ]; then
            upgrade_args+=(--allow-trust-root-upgrade)
          fi
          python3 trusted/scripts/validate-workflow-policy.py \
            --trusted-root trusted \
            --candidate-root candidate \
            "${upgrade_args[@]}" \
            candidate/.github/workflows

      - name: Install trusted validation dependencies
        id: install
        if: steps.resolve.outputs.eligible == 'true'
        run: python3 -m pip install --requirement trusted/tests/requirements.txt

      - name: Reject credentials in candidate data
        id: secret-scan
        if: steps.resolve.outputs.eligible == 'true'
        run: >-
          python3 trusted/scripts/scan-candidate-secrets.py
          candidate/README.md
          candidate/index.html
          candidate/assets/js/patterns-data.js
          candidate/experiments/NOTES.md
          candidate/verification

      - name: Reject introduced or modified package lifecycle hooks
        id: package-lifecycle
        if: steps.resolve.outputs.eligible == 'true'
        run: >-
          python3 trusted/scripts/validate-package-lifecycle.py
          --trusted-root trusted
          --candidate-root candidate

      - name: Recompute candidate evidence with trusted validator
        id: evidence
        if: steps.resolve.outputs.eligible == 'true'
        run: >-
          python3 trusted/scripts/validate-evidence.py
          --dir candidate/verification/evidence
          --registry candidate/patterns.yaml
          --experiments candidate/experiments/README.md
          --allowlist candidate/verification/pending-evidence.yaml

      - name: Recompute candidate status with trusted generator
        id: status
        if: steps.resolve.outputs.eligible == 'true'
        env:
          SUBMITTED_STATUS: ${{ runner.temp }}/submitted-verification-status.md
        run: |
          set -euo pipefail
          cp candidate/verification/STATUS.md "$SUBMITTED_STATUS"
          python3 trusted/scripts/generate-verification-status.py --root candidate
          python3 - "$SUBMITTED_STATUS" candidate/verification/STATUS.md <<'PY'
          import difflib
          import sys
          from pathlib import Path

          marker = "\n## How to refresh\n"
          submitted = Path(sys.argv[1]).read_text(encoding="utf-8")
          recomputed = Path(sys.argv[2]).read_text(encoding="utf-8")
          if marker not in submitted or marker not in recomputed:
              raise SystemExit("verification status is missing its guidance marker")
          submitted_derived = submitted.split(marker, 1)[0]
          recomputed_derived = recomputed.split(marker, 1)[0]
          if submitted_derived != recomputed_derived:
              print("Machine-derived verification status is out of date.", file=sys.stderr)
              print("".join(difflib.unified_diff(
                  submitted_derived.splitlines(keepends=True),
                  recomputed_derived.splitlines(keepends=True),
                  fromfile="submitted/verification/STATUS.md",
                  tofile="trusted-recomputed/verification/STATUS.md",
              )), file=sys.stderr)
              raise SystemExit(1)
          print("Machine-derived verification status is up to date")
          PY

      - name: Publish trusted result on the candidate revision
        if: >-
          always() &&
          github.event.pull_request.head.sha != '' &&
          (steps.resolve.outcome == 'failure' ||
           steps.resolve.outputs.eligible == 'true')
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          FAILED: >-
            ${{
              steps.resolve.outcome != 'success' ||
              steps.checkout-base.outcome != 'success' ||
              steps.checkout-candidate.outcome != 'success' ||
              steps.filesystem.outcome != 'success' ||
              steps.setup-python.outcome != 'success' ||
              steps.install-policy.outcome != 'success' ||
              steps.workflow-policy.outcome != 'success' ||
              steps.install.outcome != 'success' ||
              steps.secret-scan.outcome != 'success' ||
              steps.package-lifecycle.outcome != 'success' ||
              steps.evidence.outcome != 'success' ||
              steps.status.outcome != 'success'
            }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          state=success
          description="Trusted default-branch validator passed"
          if [ "$FAILED" = "true" ]; then
            state=failure
            description="Trusted default-branch validator failed"
          fi
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${HEAD_SHA}" \
            -f state="$state" \
            -f context="Trusted evidence checks" \
            -f description="$description" \
            -f target_url="$RUN_URL" > /dev/null
          [ "$state" = success ]

  rerun-trust-root-validation:
    name: Rerun trusted validation after owner comment
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      github.event.comment.author_association == 'OWNER'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
      pull-requests: read
      statuses: write
    steps:
      - name: Rerun completed validation for the current pull request head
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          [[ "$PR_NUMBER" =~ ^[1-9][0-9]*$ ]]
          pull=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}")
          state=$(jq -r .state <<< "$pull")
          base_ref=$(jq -r .base.ref <<< "$pull")
          if [ "$state" != open ] || [ "$base_ref" != main ]; then
            echo "::notice::Owner comment is not on an open main-targeting pull request"
            exit 0
          fi
          head_sha=$(jq -r .head.sha <<< "$pull")
          [[ "$head_sha" =~ ^[0-9a-f]{40}$ ]]
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${head_sha}" \
            -f state=failure \
            -f context="Trusted evidence checks" \
            -f description="Owner approval changed; trusted revalidation required" \
            -f target_url="$RUN_URL" > /dev/null
          run_id=
          for _ in {1..30}; do
            runs=$(gh api --paginate --slurp \
              "repos/${GITHUB_REPOSITORY}/actions/workflows/trusted-evidence-validation.yml/runs?event=pull_request_target&status=completed&head_sha=${head_sha}&per_page=100")
            run_id=$(jq -r --argjson pr "$PR_NUMBER" --arg sha "$head_sha" '
              [ .[] | .workflow_runs[]?
                | select(.event == "pull_request_target" and .status == "completed")
                | select(any(.pull_requests[]?;
                    .number == $pr and .head.sha == $sha))
              ] | sort_by(.id) | last | .id // empty
            ' <<< "$runs")
            if [[ "$run_id" =~ ^[1-9][0-9]*$ ]]; then
              break
            fi
            sleep 5
          done
          if ! [[ "$run_id" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::No completed trusted validation run matches PR #${PR_NUMBER} at ${head_sha}"
            exit 1
          fi
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/rerun" \
            > /dev/null
