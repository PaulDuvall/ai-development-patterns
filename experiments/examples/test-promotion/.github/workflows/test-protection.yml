name: Golden Test Protection

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read

jobs:
  protect-golden-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Enforce add-only human promotion
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          IS_PROMOTION: ${{ contains(github.event.pull_request.labels.*.name, 'test-promotion') }}
        run: |
          set -euo pipefail
          [[ "$BASE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$HEAD_SHA" =~ ^[0-9a-f]{40}$ ]]
          changes=$(git diff --name-status "$BASE_SHA...$HEAD_SHA" -- tests/golden/)
          if [ -z "$changes" ]; then
            echo "No golden contracts changed"
            exit 0
          fi

          if [ "$IS_PROMOTION" != true ]; then
            echo "::error::Golden changes require the test-promotion label and CODEOWNERS review"
            printf '%s\n' "$changes"
            exit 1
          fi

          invalid=$(printf '%s\n' "$changes" | awk '$1 != "A"')
          if [ -n "$invalid" ]; then
            echo "::error::Promotion PRs may add new golden tests but may not modify, rename, or delete existing contracts"
            printf '%s\n' "$invalid"
            exit 1
          fi

          echo "Golden additions are structurally eligible for human CODEOWNERS review:"
          printf '%s\n' "$changes"
