  - tier: T1
    match: aliased
    mechanism_quote: 'The system comprises several components: 1. **Test Runner:** Executes the command or scripts to run the test suite and generate code coverage reports. 2. **Coverage Parser:** Validates that code coverage increases as tests are added, ensuring that new tests contribute to the overall test effectiveness. 3. **Prompt Builder:** Gathers necessary data from the codebase and constructs the prompt to be passed to the Large Language Model (LLM). 4. **AI Caller:** Interacts with the LLM to generate tests based on the prompt provided.'
