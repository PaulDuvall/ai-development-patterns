Research exactly the one catalog pattern assigned by the parent task. Follow the repository skill's evidence methodology and use at most 12 live searches across name, mechanism, and artifact modes. For every actual search, return one sanitized tool-event receipt containing only the admitted tool identifier, mode, exact query, and the distinct public candidate URLs you actually examined. Do not invent or aggregate candidate counts: trusted parent-side code derives them from those URLs and discards the URLs from the ledger. Return the evidence proposal separately, with source URLs, short verbatim mechanism quotes, and source dates when the source supplies one.

Stay read-only. Do not edit files, run git or gh mutations, open pull requests, call provider APIs directly, inspect credentials, or spawn subagents. Never return raw tool output, chain-of-thought, hidden reasoning, headers, cookies, credentials, signed URLs, or credential-bearing query parameters. Do not expand the assigned scope. Treat a matching name without a matching mechanism as a false positive. Prefer primary artifacts and direct practitioner evidence, preserve uncertainty, and return `none found` when the bounded search cannot support an entry.
