version: "1.0"
base_url: "https://github.com/PaulDuvall/ai-development-patterns?tab=readme-ov-file"
patterns:
  # Foundation (6 patterns)
  - id: agent-readiness
    name: Agent Readiness
    category: foundation
    maturity: beginner
    anchor: "#agent-readiness"
    automatable: false
    description: >
      Systematic evaluation of codebase and team readiness for AI integration.
    related: [codified-rules, issue-generation]

  - id: codified-rules
    name: Codified Rules
    category: foundation
    maturity: beginner
    anchor: "#codified-rules"
    automatable: true
    description: >
      Version and maintain AI coding standards as explicit configuration files.
    related: [agent-readiness, security-sandbox, agent-memory, progressive-disclosure, agent-hooks, guided-refactoring]

  - id: security-sandbox
    name: Security Sandbox
    category: foundation
    maturity: beginner
    anchor: "#security-sandbox"
    automatable: true
    description: >
      Run AI tools in isolated environments without access to secrets or sensitive data.
    related: [codified-rules, policy-generation, agent-hooks, bounded-autonomy]

  - id: developer-lifecycle
    name: Developer Lifecycle
    category: foundation
    maturity: intermediate
    anchor: "#developer-lifecycle"
    automatable: false
    description: >
      A staged, plan-first discipline for taking a single feature from problem to production with AI assistance.
    related: [codified-rules, security-sandbox, planned-implementation, spec-driven-development, atomic-decomposition, agent-observability]

  - id: tool-integration
    name: Tool Integration
    category: foundation
    maturity: intermediate
    anchor: "#tool-integration"
    automatable: true
    description: >
      Connect AI systems to external data sources, APIs, and tools for enhanced capabilities beyond prompt-only interactions.
    related: [security-sandbox, developer-lifecycle, model-routing]

  - id: issue-generation
    name: Issue Generation
    category: foundation
    maturity: intermediate
    anchor: "#issue-generation"
    automatable: true
    description: >
      Generate small, deployable work items (<1 hour with AI assistance) from requirements using AI to ensure continuous delivery with clear acceptance criteria and dependency tracking.
    related: [agent-readiness, atomic-decomposition]

  # Development (17 patterns)
  - id: spec-driven-development
    name: Spec-Driven Development
    category: development
    maturity: intermediate
    anchor: "#spec-driven-development"
    automatable: true
    description: >
      Use executable specifications to guide AI code generation with clear acceptance criteria before implementation.
    related: [developer-lifecycle, custom-commands, image-spec, atomic-decomposition]

  - id: planned-implementation
    name: Planned Implementation
    category: development
    maturity: beginner
    anchor: "#planned-implementation"
    automatable: true
    description: >
      Interview, constrain, and plan before writing code so AI implementation matches actual requirements instead of confident-sounding assumptions.
    related: [incremental-generation, spec-driven-development, adversarial-evaluator]

  - id: incremental-generation
    name: Incremental Generation
    category: development
    maturity: beginner
    anchor: "#incremental-generation"
    automatable: true
    description: >
      Build complex features through small, deployable iterations rather than big-bang generation.
    related: [planned-implementation, atomic-decomposition, image-spec, adversarial-evaluator]

  - id: agent-memory
    name: Agent Memory
    category: development
    maturity: intermediate
    anchor: "#agent-memory"
    automatable: true
    description: >
      Manage AI context as a finite resource through structured memory schemas, prompt pattern capture, and session continuity protocols.
    related: [codified-rules, progressive-disclosure, code-research]

  - id: agent-hooks
    name: Agent Hooks
    category: development
    maturity: intermediate
    anchor: "#agent-hooks"
    automatable: true
    description: >
      Attach commands and policy checks to assistant lifecycle hooks so validation and workflow controls run automatically.
    related: [codified-rules, security-sandbox, custom-commands]

  - id: custom-commands
    name: Custom Commands
    category: development
    maturity: intermediate
    anchor: "#custom-commands"
    automatable: true
    description: >
      Discover and extend assistant command vocabularies with reusable workflows that encode domain expertise.
    related: [agent-hooks, spec-driven-development, codified-rules]

  - id: progressive-disclosure
    name: Progressive Disclosure
    category: development
    maturity: intermediate
    anchor: "#progressive-disclosure"
    automatable: true
    description: >
      Load AI assistant rules incrementally based on task context to prevent instruction saturation and context bloat.
    related: [codified-rules, agent-memory, centralized-rules]

  - id: atomic-decomposition
    name: Atomic Decomposition
    category: development
    maturity: intermediate
    anchor: "#atomic-decomposition"
    automatable: true
    description: >
      Break complex features into atomic, independently implementable tasks for parallel AI agent execution.
    related: [incremental-generation, parallel-agents]

  - id: guided-refactoring
    name: Guided Refactoring
    category: development
    maturity: intermediate
    anchor: "#guided-refactoring"
    automatable: true
    description: >
      Improve code systematically with AI, measurable quality metrics, and test-preserving refactoring rules.
    related: [codified-rules, debt-forecasting]

  - id: agent-observability
    name: Agent Observability
    category: development
    maturity: intermediate
    anchor: "#agent-observability"
    automatable: false
    description: >
      Capture structured traces, tool events, evaluations, and runtime context so teams and agents can diagnose and improve behavior.
    related: [developer-lifecycle, error-resolution, bounded-autonomy]

  - id: image-spec
    name: Image Spec
    category: development
    maturity: intermediate
    anchor: "#image-spec"
    automatable: true
    description: >
      Use screenshots and design mockups as visual specifications that coding agents translate into UI code and refine through visual feedback.
    related: [spec-driven-development, incremental-generation]

  - id: adversarial-evaluator
    name: Adversarial Evaluator
    category: development
    maturity: intermediate
    anchor: "#adversarial-evaluator"
    automatable: true
    description: >
      Separate the generating agent from an independent judge and use adversarial pressure or cross-model divergence as an evaluation signal.
    related: [planned-implementation, incremental-generation, spec-driven-development]

  - id: parallel-agents
    name: Parallel Agents
    category: development
    maturity: advanced
    anchor: "#parallel-agents"
    automatable: false
    description: >
      Run multiple AI agents concurrently on isolated tasks or environments to maximize development speed and exploration.
    related: [atomic-decomposition, bounded-autonomy]

  - id: error-resolution
    name: Error Resolution
    category: development
    maturity: intermediate
    anchor: "#error-resolution"
    automatable: false
    description: >
      Collect failure context, reproduce and diagnose the cause with AI, then apply a proposed fix only after human review and deterministic validation.
    related: [developer-lifecycle, agent-observability, tool-integration]

  - id: model-routing
    name: Model Routing
    category: development
    maturity: advanced
    anchor: "#model-routing"
    automatable: true
    description: >
      Route each task to a model whose capability, context, latency, and cost profile matches the work.
    related: [incremental-generation, adversarial-evaluator, tool-integration]

  - id: code-research
    name: Code Research
    category: development
    maturity: intermediate
    anchor: "#code-research"
    automatable: true
    description: >
      Answer technical questions with isolated agent-run experiments that produce executable, reviewable evidence.
    related: [parallel-agents, agent-memory, tool-integration, adversarial-evaluator]

  - id: bounded-autonomy
    name: Bounded Autonomy
    category: development
    maturity: advanced
    anchor: "#bounded-autonomy"
    automatable: true
    description: >
      Cap autonomous loops by turns, spend, and time while detecting stalls and preserving a machine-readable evidence trail.
    related: [parallel-agents, agent-memory, agent-observability]

  # Operations (6 patterns)
  - id: policy-generation
    name: Policy Generation
    category: operations
    maturity: advanced
    anchor: "#policy-generation"
    automatable: false
    description: >
      Convert natural-language policy intent or runtime context into validated policy-as-code such as Cedar, Rego, OPA, and Gatekeeper.
    related: [security-sandbox, evidence-automation]

  - id: evidence-automation
    name: Evidence Automation
    category: operations
    maturity: advanced
    anchor: "#evidence-automation"
    automatable: true
    description: >
      Continuously collect control evidence from logs and configuration changes into dated, audit-ready records.
    related: [policy-generation, agent-observability, centralized-rules]

  - id: centralized-rules
    name: Centralized Rules
    category: operations
    maturity: advanced
    anchor: "#centralized-rules"
    automatable: true
    description: >
      Enforce organization-wide AI instructions from a central source that synchronizes standard assistant configuration files.
    related: [codified-rules, progressive-disclosure, evidence-automation]

  - id: drift-remediation
    name: Drift Remediation
    category: operations
    maturity: advanced
    anchor: "#drift-remediation"
    automatable: true
    description: >
      Detect infrastructure drift against declared state and generate reviewable corrective patches with approval gates.
    related: [agent-observability, error-resolution, bounded-autonomy]

  - id: debt-forecasting
    name: Debt Forecasting
    category: operations
    maturity: intermediate
    anchor: "#debt-forecasting"
    automatable: true
    description: >
      Forecast maintenance burden from code, dependency, coverage, and documentation trends so teams can prioritize technical debt.
    related: [guided-refactoring, model-routing, tool-integration]

  - id: guided-chaos
    name: Guided Chaos
    category: operations
    maturity: advanced
    anchor: "#guided-chaos"
    automatable: true
    description: >
      Generate hypothesis-driven chaos experiments from architecture and dependency evidence with explicit blast-radius and recovery controls.
    related: [agent-observability, bounded-autonomy, error-resolution]
